  <style>
    * { box-sizing: border-box; }
    body {

      touch-action: none;

    #renderCanvas {

    #p5-container {

      z-index: 3;
    }
    #p5-container canvas { pointer-events: none !important; }
    .gesture-indicator {
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 16px;
      background: rgba(0, 150, 255, 0.8);
      border: 1px solid rgba(0, 200, 255, 0.8);
      border-radius: 20px;
      color: white;
      font-size: 14px;

      opacity: 0;
      transition: opacity 0.3s;
      text-shadow: 0 0 5px rgba(0, 150, 255, 0.8);
      white-space: nowrap;
    }
    .gesture-indicator.show { opacity: 1; }
    #scanning-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      background-color: rgba(0, 0, 0, 0.25);
      opacity: 1;
      transition: opacity 0.5s;

    #scanning-overlay.hidden { opacity: 0; }
    .scanner-inner {
      width: 220px;
      height: 220px;
      border: 2px solid rgba(0, 255, 255, 0.7);
      border-radius: 12px;
      position: relative;
      overflow: hidden;

    .scanner-line {
      position: absolute;
      height: 2px;

      top: 0;
      animation: scan 2.2s ease-in-out infinite;

    .corner {
      position: absolute;

      border-style: solid;
      border-width: 0;

    .corner-tl { top: -2px; left: -2px; border-top-width: 3px; border-left-width: 3px; border-radius: 4px 0 0 0; }
    .corner-tr { top: -2px; right: -2px; border-top-width: 3px; border-right-width: 3px; border-radius: 0 4px 0 0; }
    .corner-bl { bottom: -2px; left: -2px; border-bottom-width: 3px; border-left-width: 3px; border-radius: 0 0 0 4px; }
    .corner-br { bottom: -2px; right: -2px; border-bottom-width: 3px; border-right-width: 3px; border-radius: 0 0 4px 0; }
    .scanning-text {
      position: absolute;
      bottom: -38px;

    @keyframes scan {

    .icon-button {

  <!-- 偵錯面板 -->
  <div id="debug-panel"></div>

  <script>
  // ═══════════════════════════════════════════════════
  //  偵錯系統（幫助診斷手機上的問題）
  // ═══════════════════════════════════════════════════
  const Debug = {
    panel: null,
    init() {
      this.panel = document.getElementById('debug-panel');
      // 長按偵錯按鈕 2 秒顯示面板
      let pressTimer;
      const btn = document.getElementById('debug-button');
      btn.addEventListener('touchstart', () => {
        pressTimer = setTimeout(() => this.panel.classList.toggle('show'), 2000);
      });
      btn.addEventListener('touchend', () => clearTimeout(pressTimer));
      btn.addEventListener('click', () => this.panel.classList.toggle('show'));

      // 攔截所有 console.error
      const origError = console.error.bind(console);
      console.error = (...args) => { this.log(args.join(' '), 'err'); origError(...args); };
      const origWarn = console.warn.bind(console);
      console.warn = (...args) => { this.log(args.join(' '), 'inf'); origWarn(...args); };

      window.addEventListener('error', (e) => this.log(`JS錯誤: ${e.message} (${e.filename}:${e.lineno})`, 'err'));
    },
    log(msg, type = 'inf') {
      if (!this.panel) return;
      const line = document.createElement('div');
      line.className = type;
      line.textContent = `${new Date().toLocaleTimeString()} ${msg}`;
      this.panel.appendChild(line);
      this.panel.scrollTop = this.panel.scrollHeight;
      console.log(`[Debug] ${msg}`);
    }
  };
  Debug.init();

  // ═══════════════════════════════════════════════════
  //  啟動前檢查：確認所有必要檔案是否存在
  // ═══════════════════════════════════════════════════
  async function preflightCheck() {
    const checks = [
      { url: './external/xr/xr.js',          label: 'xr.js 引擎' },
      { url: './external/xr/xr-slam.js',      label: 'xr-slam.js SLAM模組' },
      { url: './external/xrextras/xrextras.js', label: 'xrextras.js' },
      { url: AR_CONFIG.targetJsonPath,         label: 'target JSON' },
    ];
    let allOk = true;
    for (const c of checks) {
      try {
        const r = await fetch(c.url, { method: 'HEAD' });
        if (r.ok) {
          Debug.log(`✅ ${c.label} 載入成功`, 'ok');
        } else {
          Debug.log(`❌ ${c.label} 找不到 (HTTP ${r.status}) → ${c.url}`, 'err');
          allOk = false;
        }
      } catch(e) {
        Debug.log(`❌ ${c.label} 網路錯誤 → ${c.url}`, 'err');
        allOk = false;
      }
    }
    return allOk;
  }

  // ═══════════════════════════════════════════════════
  //  P5.JS 流水系統
  // ═══════════════════════════════════════════════════
  let waterSketch;
  let currentGesture = 'none';
  let gestureTimeout;

  const p5WaterSketch = (p) => {
    let particles = [];
    const maxParticles = 350;
    let noiseOffset = 0;
    let touchActive = false;
    let currentTouchX = 0;
    let currentTouchY = 0;
    let waterIntensity = 1.0;

    class WaterParticle {
      constructor(x, y, intensity = 1.0, gestureType = 'default') {
        this.pos = p.createVector(x, y);
        this.vel = p.createVector(p.random(-1, 1), p.random(-2, 0));
        this.acc = p.createVector(0, 0);
        this.life = 255;
        this.maxLife = 255;
        this.size = p.random(10, 25) * intensity;
        this.intensity = intensity;
        this.gestureType = gestureType;
        this.gravity = p.createVector(0, 0.05 * intensity);
        this.drag = 0.98;
        this.isWhirlpool = false;
        this.isWavy = false;
        this._adjustForGesture();
      }
      _adjustForGesture() {
        switch(this.gestureType) {
          case 'circle': this.vel.mult(0.5); this.isWhirlpool = true; break;
          case 'swipe':  this.vel.mult(2); break;
          case 's-curve': this.isWavy = true; break;
          case 'tap': {
            const angle = p.random(p.TWO_PI);
            this.vel = p.createVector(p.cos(angle), p.sin(angle)).mult(p.random(1, 4) * this.intensity);
            break;
          }
        }
      }
      applyForce(f) { this.acc.add(f); }
      update() {
        this.applyForce(this.gravity);
        this.vel.add(this.acc);
        this.vel.mult(this.drag);
        this.pos.add(this.vel);
        this.acc.mult(0);
        const turb = p.noise(this.pos.x * 0.01, this.pos.y * 0.01, noiseOffset) - 0.5;
        this.vel.x += turb * 0.3;
        if (this.isWhirlpool) {
          const a = p.atan2(this.pos.y - currentTouchY, this.pos.x - currentTouchX);
          const f = p.createVector(p.cos(a + p.PI/2), p.sin(a + p.PI/2)).mult(0.2 * this.intensity);
          this.applyForce(f);
          const pull = p.createVector(currentTouchX - this.pos.x, currentTouchY - this.pos.y);
          pull.normalize().mult(0.05);
          this.applyForce(pull);
        }
        if (this.isWavy) this.vel.x += p.sin(this.pos.y * 0.05 + noiseOffset) * 0.5;
        this.life -= p.random(1.5, 4);
        this.size *= 0.99;
      }
      display() {
        const alpha = p.map(this.life, 0, this.maxLife, 0, 255);
        const progress = 1 - (this.life / this.maxLife);
        let r, g, b;
        if (progress < 0.3)      { r = 200 + progress*55; g = 220 + progress*35; b = 255; }
        else if (progress < 0.7) { r = 100-(progress-.3)*100; g = 180-(progress-.3)*80; b = 255; }
        else                     { r = 0; g = 100-(progress-.7)*100; b = 200-(progress-.7)*50; }
        p.push();
        p.translate(this.pos.x, this.pos.y);
        p.fill(r, g, b, alpha * 0.2); p.noStroke(); p.ellipse(0, 0, this.size * 1.5);
        p.fill(r, g, b, alpha * 0.7); p.ellipse(0, 0, this.size);
        if (this.life > this.maxLife * 0.5) { p.fill(220, 240, 255, alpha); p.ellipse(0, 0, this.size * 0.3); }
        p.pop();
      }
      isDead() { return this.life <= 0 || this.size < 1; }
    }

    p.setup = function() {
      const canvas = p.createCanvas(p.windowWidth, p.windowHeight);
      canvas.parent('p5-container');
      p.colorMode(p.RGB, 255);
      p.blendMode(p.ADD);
    };
    p.draw = function() {
      p.clear();
      noiseOffset += 0.01;
      if (touchActive && particles.length < maxParticles) {
        const count = Math.floor(waterIntensity * 8);
        for (let i = 0; i < count; i++) {
          particles.push(new WaterParticle(
            currentTouchX + p.random(-15, 15),
            currentTouchY + p.random(-15, 15),
            waterIntensity, currentGesture
          ));
        }
      }
      for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update(); particles[i].display();
        if (particles[i].isDead()) particles.splice(i, 1);
      }
    };
    p.windowResized = function() { p.resizeCanvas(p.windowWidth, p.windowHeight); };
    p.setTouchActive      = (a, x, y) => { touchActive = a; if (a) { currentTouchX = x; currentTouchY = y; } };
    p.updateTouchPosition = (x, y)    => { currentTouchX = x; currentTouchY = y; };
    p.setWaterIntensity   = (v)        => { waterIntensity = p.constrain(v, 0.1, 3.0); };
    p.setGestureType      = (g)        => { currentGesture = g; };
  };

  // ═══════════════════════════════════════════════════
  //  手勢識別系統
  // ═══════════════════════════════════════════════════
  class GestureRecognizer {
    constructor() { this.points = []; }
    startGesture(x, y) { this.points = [{x, y}]; }
    addPoint(x, y) {
      if (!this.points.length) return;
      this.points.push({x, y});
      if (this.points.length > 50) this.points.shift();
    }
    endGesture() {
      if (this.points.length < 5) return 'tap';
      return this._analyze();
    }
    _analyze() {
      if (this._isCircle()) return 'circle';
      if (this._isSwipe())  return 'swipe';
      if (this._isSCurve()) return 's-curve';
      return 'default';
    }
    _isCircle() {
      if (this.points.length < 10) return false;
      let cx = 0, cy = 0;
      this.points.forEach(p => { cx += p.x; cy += p.y; });
      cx /= this.points.length; cy /= this.points.length;
      let avgR = 0;
      this.points.forEach(p => { avgR += Math.hypot(p.x-cx, p.y-cy); });
      avgR /= this.points.length;
      if (avgR < 20) return false;
      const valid = this.points.filter(p => Math.abs(Math.hypot(p.x-cx, p.y-cy) - avgR) < avgR * 0.4).length;
      return valid / this.points.length > 0.8;
    }
    _isSwipe() {
      const s = this.points[0], e = this.points[this.points.length-1];
      return Math.hypot(e.x-s.x, e.y-s.y) > 100;
    }
    _isSCurve() {
      if (this.points.length < 8) return false;
      let changes = 0, lastDir = null;
      for (let i = 1; i < this.points.length-1; i++) {
        let diff = Math.atan2(this.points[i+1].y-this.points[i].y, this.points[i+1].x-this.points[i].x)
                 - Math.atan2(this.points[i].y-this.points[i-1].y, this.points[i].x-this.points[i-1].x);
        while (diff >  Math.PI) diff -= 2*Math.PI;
        while (diff < -Math.PI) diff += 2*Math.PI;
        const dir = diff > 0 ? 'L' : 'R';
        if (lastDir && lastDir !== dir) changes++;
        lastDir = dir;
      }
      return changes >= 2;
    }
  }

  // ═══════════════════════════════════════════════════
  //  UI 輔助
  // ═══════════════════════════════════════════════════
  function showStatus(text, duration = 2500) {
    const el = document.getElementById('status');
    el.textContent = text; el.classList.add('show');
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.remove('show'), duration);
  }
  function showGesture(text, duration = 1800) {
    const el = document.getElementById('gesture');
    el.textContent = text; el.classList.add('show');
    clearTimeout(gestureTimeout);
    gestureTimeout = setTimeout(() => el.classList.remove('show'), duration);
  }
  function animateButton(btn) {
    btn.classList.add('clicked');
    setTimeout(() => btn.classList.remove('clicked'), 600);
  }
  function triggerFoundFlash() {
    const f = document.getElementById('found-flash');
    f.classList.add('flash');
    setTimeout(() => f.classList.remove('flash'), 800);
  }
  function triggerWaterBurst() {
    const cx = window.innerWidth/2, cy = window.innerHeight/2;
    waterSketch.setTouchActive(true, cx, cy);
    waterSketch.setGestureType('tap');
    waterSketch.setWaterIntensity(3.0);
    setTimeout(() => {
      waterSketch.setTouchActive(false, 0, 0);
      waterSketch.setWaterIntensity(appState.waterIntensity);
    }, 1200);
  }

  const appState = {
    targetFound: false, audioEnabled: false,
    continuePlay: false, fullscreen: false,
    hasPlayed: false, waterIntensity: 1.0,
  };

  // ═══════════════════════════════════════════════════
  //  8th Wall AR Pipeline Module
  // ═══════════════════════════════════════════════════
  function createARPipelineModule() {
    let videoEl, videoTexture, videoMesh;
    const scanningOverlay      = document.getElementById('scanning-overlay');
    const fullscreenContainer  = document.getElementById('fullscreen-video-container');
    const fullscreenVideo      = document.getElementById('fullscreen-video');

    function createVideoElement() {
      const v = document.createElement('video');
      v.src = AR_CONFIG.videoSrc;
      v.loop = true; v.muted = true; v.playsInline = true;
      v.crossOrigin = 'anonymous';
      v.setAttribute('webkit-playsinline', 'true');
      return v;
    }
    async function playVideo(v) {
      if (!v || !v.src) return;
      try { await v.play(); }
      catch { v.muted = true; appState.audioEnabled = false; updateButtonIcons(); await v.play().catch(()=>{}); }
    }
    function pauseVideo(v) { if (v) v.pause(); }

    function enterFullscreen() {
      if (!videoEl) return;
      fullscreenVideo.src = videoEl.src;
      fullscreenVideo.currentTime = videoEl.currentTime;
      fullscreenVideo.muted = !appState.audioEnabled;
      fullscreenContainer.classList.add('visible');
      appState.fullscreen = true;
      playVideo(fullscreenVideo);
    }
    function exitFullscreen() {
      if (!appState.fullscreen) return;
      if (videoEl) videoEl.currentTime = fullscreenVideo.currentTime;
      fullscreenContainer.classList.remove('visible');
      appState.fullscreen = false;
      pauseVideo(fullscreenVideo);
      fullscreenVideo.src = '';
    }
    function updateButtonIcons() {
      document.getElementById('play-icon').style.display   = appState.continuePlay ? 'none' : 'block';
      document.getElementById('pause-icon').style.display  = appState.continuePlay ? 'block' : 'none';
      document.getElementById('play-button').classList.toggle('active', appState.continuePlay);
      document.getElementById('sound-on-icon').style.display  = appState.audioEnabled ? 'block' : 'none';
      document.getElementById('sound-off-icon').style.display = appState.audioEnabled ? 'none' : 'block';
      document.getElementById('sound-button').classList.toggle('active', appState.audioEnabled);
    }
    function toggleAudio() {
      appState.audioEnabled = !appState.audioEnabled;
      if (videoEl) videoEl.muted = !appState.audioEnabled;
      fullscreenVideo.muted = !appState.audioEnabled;
      updateButtonIcons();
      showStatus(appState.audioEnabled ? '🔊 聲音已開啟' : '🔇 靜音模式');
    }

    function setupButtons() {
      document.getElementById('play-button').addEventListener('click', () => {
        animateButton(document.getElementById('play-button'));
        if (!appState.hasPlayed) { showStatus('請先掃描目標'); return; }
        appState.continuePlay = !appState.continuePlay;
        updateButtonIcons();
        if (appState.continuePlay) {
          showStatus('▶ 持續播放模式');
          if (!appState.targetFound) { enterFullscreen(); scanningOverlay.classList.add('hidden'); }
          else if (videoEl && videoEl.paused) playVideo(videoEl);
        } else {
          showStatus('⏸ 暫停'); exitFullscreen();
          if (!appState.targetFound && videoEl) pauseVideo(videoEl);
          if (!appState.targetFound) scanningOverlay.classList.remove('hidden');
        }
      });
      document.getElementById('sound-button').addEventListener('click', () => {
        animateButton(document.getElementById('sound-button')); toggleAudio();
      });
      let intensityLevel = 1;
      document.getElementById('water-button').addEventListener('click', () => {
        animateButton(document.getElementById('water-button'));
        intensityLevel = (intensityLevel % 3) + 1;
        appState.waterIntensity = intensityLevel * 0.9;
        waterSketch.setWaterIntensity(appState.waterIntensity);
        const msgs = { 1:'💧 弱水流', 2:'💧💧 中水流', 3:'💧💧💧 強水流' };
        showStatus(msgs[intensityLevel]);
        document.getElementById('water-button').classList.toggle('active', intensityLevel === 3);
      });
      fullscreenContainer.addEventListener('click', () => {
        exitFullscreen(); appState.continuePlay = false; updateButtonIcons();
        if (!appState.targetFound) scanningOverlay.classList.remove('hidden');
      });
      document.addEventListener('keydown', (e) => {
        if (e.key === ' ') { e.preventDefault(); document.getElementById('play-button').click(); }
        if (e.key === 'm') { e.preventDefault(); document.getElementById('sound-button').click(); }
        if (e.key === 'f') { e.preventDefault(); document.getElementById('water-button').click(); }
      });
    }

    function onImageFound({ detail }) {
      const { position, rotation, scale } = detail;
      videoMesh.position.set(position.x, position.y, position.z);
      videoMesh.quaternion.set(rotation.x, rotation.y, rotation.z, rotation.w);
      videoMesh.scale.set(scale, scale, scale);
      videoMesh.visible = true;
      appState.targetFound = true; appState.hasPlayed = true;
      scanningOverlay.classList.add('hidden');
      triggerFoundFlash();
      showStatus('✅ 目標已識別');
      Debug.log('✅ imagefound — scale: ' + scale.toFixed(3), 'ok');
      if (appState.fullscreen) exitFullscreen();
      playVideo(videoEl);
      triggerWaterBurst();
    }
    function onImageUpdated({ detail }) {
      const { position, rotation, scale } = detail;
      videoMesh.position.set(position.x, position.y, position.z);
      videoMesh.quaternion.set(rotation.x, rotation.y, rotation.z, rotation.w);
      videoMesh.scale.set(scale, scale, scale);
    }
    function onImageLost() {
      videoMesh.visible = false; appState.targetFound = false;
      showStatus('⚠️ 目標丟失');
      Debug.log('⚠️ imagelost', 'inf');
      if (appState.continuePlay) { enterFullscreen(); }
      else {
        pauseVideo(videoEl);
        setTimeout(() => {
          if (!appState.targetFound && !appState.continuePlay) scanningOverlay.classList.remove('hidden');
        }, 300);
      }
    }

    return {
      name: 'ar-video-app',
      onStart: () => {
        const xrScene = XR8.Threejs.xrScene();
        const { scene } = xrScene;
        videoEl = createVideoElement();
        videoTexture = new THREE.VideoTexture(videoEl);
        videoTexture.minFilter = THREE.LinearFilter;
        videoTexture.magFilter = THREE.LinearFilter;
        videoTexture.format = THREE.RGBAFormat;
        const aspect = AR_CONFIG.videoAspectRatio;
        const geometry = new THREE.PlaneGeometry(1, 1 / aspect);
        const material = new THREE.MeshBasicMaterial({ map: videoTexture, side: THREE.DoubleSide, toneMapped: false });
        videoMesh = new THREE.Mesh(geometry, material);
        videoMesh.visible = false;
        scene.add(videoMesh);
        scene.add(new THREE.AmbientLight(0xffffff, 1.0));
        setupButtons();
        Debug.log('✅ AR Scene 初始化完成', 'ok');
        setTimeout(() => {
          showStatus('請掃描目標圖像', 3500);
          setTimeout(() => showGesture('觸控螢幕體驗流水效果', 3000), 1200);
        }, 800);
      },
      listeners: [
        { event: 'reality.imagefound',   process: onImageFound   },
        { event: 'reality.imageupdated', process: onImageUpdated },
        { event: 'reality.imagelost',    process: onImageLost    },
      ],
      onAttach: () => {
        document.addEventListener('visibilitychange', () => {
          if (document.hidden) {
            if (videoEl) pauseVideo(videoEl);
            if (appState.fullscreen) pauseVideo(fullscreenVideo);
            waterSketch && waterSketch.setTouchActive(false, 0, 0);
          } else {
            if (appState.fullscreen) playVideo(fullscreenVideo);
            else if (appState.targetFound && videoEl) playVideo(videoEl);
          }
        });
      },
    };
  }

  // ═══════════════════════════════════════════════════
  //  觸控手勢系統
  // ═══════════════════════════════════════════════════
  function setupGestureSystem() {
    const recognizer = new GestureRecognizer();
    let isDrawing = false;
    const msgs = { tap:'💧 水滴漣漪', circle:'🌀 漩渦水流', swipe:'🌊 強力水流', 's-curve':'🐍 蛇行水流', default:'💧 基礎水流' };
    function onStart(e) {
      if (e.target.closest('.controls-container, #fullscreen-video-container')) return;
      const t = e.touches ? e.touches[0] : e;
      isDrawing = true;
      recognizer.startGesture(t.clientX, t.clientY);
      waterSketch.setTouchActive(true, t.clientX, t.clientY);
      waterSketch.setWaterIntensity(appState.waterIntensity);
      showGesture('💧 流水啟動', 600);
    }
    function onMove(e) {
      if (!isDrawing) return;
      const t = e.touches ? e.touches[0] : e;
      recognizer.addPoint(t.clientX, t.clientY);
      waterSketch.updateTouchPosition(t.clientX, t.clientY);
    }
    function onEnd(e) {
      if (!isDrawing) return;
      isDrawing = false;
      const g = recognizer.endGesture();
      currentGesture = g;
      waterSketch.setGestureType(g);
      waterSketch.setTouchActive(false, 0, 0);
      showGesture(msgs[g] || msgs.default, 2000);
    }
    document.body.addEventListener('touchstart', onStart, { passive: false });
    document.body.addEventListener('touchmove',  onMove,  { passive: false });
    document.body.addEventListener('touchend',   onEnd,   { passive: false });
    document.body.addEventListener('mousedown',  onStart);
    document.body.addEventListener('mousemove',  onMove);
    document.body.addEventListener('mouseup',    onEnd);
  }

  // ═══════════════════════════════════════════════════
  //  主入口
  // ═══════════════════════════════════════════════════
  window.addEventListener('xrloaded', async () => {
    Debug.log('✅ xrloaded 觸發，引擎載入成功', 'ok');
    showStatus('載入目標資料...', 3000);

    let targetData;
    try {
      Debug.log('正在 fetch: ' + AR_CONFIG.targetJsonPath, 'inf');
      const r = await fetch(AR_CONFIG.targetJsonPath);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      targetData = await r.json();
      Debug.log('✅ target JSON 載入成功: ' + targetData.name, 'ok');
    } catch (err) {
      Debug.log('❌ target JSON 載入失敗: ' + err.message, 'err');
      showStatus('❌ 目標資料載入失敗', 8000);
      return;
    }

    XR8.XrController.configure({
      disableWorldTracking: true,
      imageTargetData: [targetData],
    });

    const modules = [
      XR8.GlTextureRenderer.pipelineModule(),
      XR8.Threejs.pipelineModule(),
      XR8.XrController.pipelineModule(),
    ];
    if (typeof XRExtras !== 'undefined') {
      if (XRExtras.AlmostThere)  modules.push(XRExtras.AlmostThere.pipelineModule());
      if (XRExtras.Loading)      modules.push(XRExtras.Loading.pipelineModule());
      if (XRExtras.RuntimeError) modules.push(XRExtras.RuntimeError.pipelineModule());
    }
    modules.push(createARPipelineModule());
    XR8.addCameraPipelineModules(modules);
    XR8.run({ canvas: document.getElementById('renderCanvas') });
    Debug.log('✅ XR8.run() 已執行，等待相機許可', 'ok');

    waterSketch = new p5(p5WaterSketch);
    setupGestureSystem();
  });

  window.addEventListener('xrerror', (e) => {
    Debug.log('❌ xrerror: ' + JSON.stringify(e.detail), 'err');
    showStatus('❌ AR 引擎錯誤，請查看偵錯面板', 10000);
  });

  // 頁面載入後先做檔案存在性檢查
  window.addEventListener('load', async () => {
    Debug.log('頁面載入完成，開始 preflight 檢查...', 'inf');
    const ok = await preflightCheck();
    if (!ok) {
      Debug.panel.classList.add('show'); // 有問題就自動顯示偵錯面板
      showStatus('❌ 有檔案缺失，請查看偵錯面板', 8000);
    }
  });
  </script>
</body>
