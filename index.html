<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>AI AR × 一畫千言</title>

  <script>

    targets: [
      {
        jsonPath:         './image-targets/shoptarget.json',
        videoSrc:         'https://pub-ac80c6d0a305452bbe0bdfcec65b6a2c.r2.dev/Pirate%20ship.mp4',
        videoAspectRatio: 4 / 3,
        productName:      '海賊船金屬海報',
        productInfo:      '一畫千言品牌，昇華金屬板印刷工藝，高解析度海賊船主題藝術海報，色彩永久定著於鋁板',
        sceneHint:        '大海、海盜、冒險、波浪、船帆、深邃藍色',

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="./external/xr/xr.js" data-preload-chunks="slam"></script>

  <style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Noto+Sans+TC:wght@300;400;700&display=swap');
  :root{--c1:#00c8ff;--c2:#0044ff;--bg:rgba(0,8,24,.97);--card:rgba(0,6,20,.96);--t1:rgba(220,248,255,1);--t2:rgba(150,220,255,.85);--t3:rgba(70,140,190,.5);--fhud:'Share Tech Mono',monospace;--ftitle:'Orbitron',monospace;--fbody:'Noto Sans TC',sans-serif}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:none}
  #renderCanvas{position:fixed!important;top:0!important;left:0!important;width:100vw!important;height:100vh!important;z-index:0}
  [class*="xr8"],[id*="xr8"],[class*="poweredby"],[id*="powered"]{visibility:hidden!important;pointer-events:none!important}
  [class*="watermark"],[id*="watermark"]{display:none!important}

  /* TAP-TO-START */
  #tap-start{position:fixed;inset:0;z-index:9999;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:opacity .9s ease;overflow:hidden}
  #tap-start::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 70% at 50% 45%,rgba(0,60,160,.2),transparent 70%);pointer-events:none}
  .ts-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,150,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(0,150,255,.05) 1px,transparent 1px);background-size:38px 38px;pointer-events:none;mask-image:radial-gradient(ellipse at 50% 50%,black 30%,transparent 80%)}
  .ts-brand{font-family:var(--fhud);font-size:9px;letter-spacing:3.5px;color:rgba(0,170,255,.4);margin-bottom:34px;text-align:center;animation:fIn 1s .2s ease both}
  .ts-portal{position:relative;width:168px;height:168px;margin-bottom:30px;animation:fIn .8s .4s ease both}
  .ts-ring{position:absolute;top:50%;left:50%;border-radius:50%;border:1.5px solid var(--c1);transform:translate(-50%,-50%)}
  .ts-ring:nth-child(1){width:168px;height:168px;opacity:.18;animation:tspin 9s linear infinite}
  .ts-ring:nth-child(2){width:126px;height:126px;opacity:.34;animation:tspin 5.5s linear reverse infinite}
  .ts-ring:nth-child(3){width:86px;height:86px;opacity:.55;animation:tspin 3.8s linear infinite;border-color:var(--c2)}
  .ts-ring:nth-child(4){width:50px;height:50px;opacity:.88;animation:tspin 2.2s linear reverse infinite;box-shadow:0 0 18px rgba(0,180,255,.5)}
  @keyframes tspin{to{transform:translate(-50%,-50%) rotate(360deg)}}
  .ts-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
  .ts-icon{font-size:26px;display:block;margin-bottom:3px;animation:float 3s ease-in-out infinite}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  .ts-icon-txt{font-family:var(--fhud);font-size:8px;letter-spacing:2px;color:rgba(0,200,255,.4);animation:pulse 2s infinite}
  .ts-title{font-family:var(--ftitle);font-size:20px;font-weight:900;color:#fff;text-align:center;line-height:1.4;letter-spacing:2px;margin-bottom:8px;text-shadow:0 0 36px rgba(0,170,255,.55);animation:fIn .8s .6s ease both}
  .ts-sub{font-family:var(--fhud);font-size:9px;color:rgba(0,170,255,.42);letter-spacing:2px;text-align:center;margin-bottom:26px;animation:fIn .8s .7s ease both}
  .ts-flow{display:flex;align-items:center;gap:5px;margin-bottom:38px;animation:fIn .8s .9s ease both}
  .ts-step{font-family:var(--fhud);font-size:8.5px;letter-spacing:.8px;color:rgba(0,170,255,.52);text-align:center;padding:5px 7px;border:1px solid rgba(0,130,255,.18);border-radius:6px;background:rgba(0,50,140,.1);line-height:1.5}
  .ts-arr{font-size:9px;color:rgba(0,130,255,.28)}
  .ts-tap{font-family:var(--fhud);font-size:11px;letter-spacing:3px;color:rgba(0,210,255,.72);text-align:center;animation:tapPulse 1.8s ease-in-out infinite,fIn .8s 1.1s ease both}
  @keyframes tapPulse{0%,100%{opacity:.9;transform:scale(1)}50%{opacity:.22;transform:scale(.97)}}
  @keyframes fIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  @keyframes pulse{0%,100%{opacity:.9}50%{opacity:.18}}
  .ts-loader{position:absolute;bottom:34px;left:50%;transform:translateX(-50%);font-family:var(--fhud);font-size:10px;letter-spacing:2px;color:rgba(0,190,255,.52);white-space:nowrap;display:none;animation:pulse 1.2s infinite}
  .ts-loader.on{display:block}

  /* PORTAL VFX */
  #pvfx{position:fixed;inset:0;z-index:8;pointer-events:none;display:none}
  #pvfx.on{display:block}
  .pvring{position:absolute;top:50%;left:50%;border-radius:50%;border:2px solid var(--c1);transform:translate(-50%,-50%) scale(0);opacity:0}
  .pvring.burst{animation:pvBurst .95s cubic-bezier(.15,.85,.25,1) forwards}
  .pvring:nth-child(2){animation-delay:.1s!important;width:220px;height:220px}
  .pvring:nth-child(3){animation-delay:.22s!important;border-color:rgba(0,80,255,.6);width:360px;height:360px}
  @keyframes pvBurst{0%{transform:translate(-50%,-50%) scale(0);opacity:.95}70%{opacity:.4}100%{transform:translate(-50%,-50%) scale(1);opacity:0}}
  .pvflash{position:absolute;inset:0;background:radial-gradient(circle at 50%,rgba(0,180,255,.2),transparent 62%);opacity:0;animation:pvFlash 1.4s ease forwards}
  @keyframes pvFlash{0%{opacity:0}18%{opacity:1}100%{opacity:0}}

  /* SCAN OVERLAY */
  #scan-ov{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:38px;pointer-events:none;transition:opacity .6s}
  #scan-ov.hidden{opacity:0}
  .sbox{width:210px;height:210px;position:relative;border:1.5px solid rgba(0,200,255,.28);border-radius:12px;box-shadow:0 0 36px rgba(0,200,255,.06)}
  .sline{position:absolute;height:1.5px;width:100%;top:0;background:linear-gradient(90deg,transparent,var(--c1) 30%,var(--c1) 70%,transparent);animation:scanLine 2.2s ease-in-out infinite;box-shadow:0 0 10px rgba(0,220,255,.6)}
  @keyframes scanLine{0%{transform:translateY(0)}50%{transform:translateY(207px)}100%{transform:translateY(0)}}
  .corn{position:absolute;width:18px;height:18px;border-color:rgba(0,220,255,.85);border-style:solid;border-width:0}
  .c-tl{top:-1.5px;left:-1.5px;border-top-width:2.5px;border-left-width:2.5px;border-radius:4px 0 0 0}
  .c-tr{top:-1.5px;right:-1.5px;border-top-width:2.5px;border-right-width:2.5px;border-radius:0 4px 0 0}
  .c-bl{bottom:-1.5px;left:-1.5px;border-bottom-width:2.5px;border-left-width:2.5px;border-radius:0 0 0 4px}
  .c-br{bottom:-1.5px;right:-1.5px;border-bottom-width:2.5px;border-right-width:2.5px;border-radius:0 0 4px 0}
  #scan-lbl{font-family:var(--fhud);font-size:9.5px;letter-spacing:2.5px;color:rgba(0,190,255,.62);text-align:center;line-height:2.2;animation:pulse 2s infinite}

  /* STATUS */
  #status{position:fixed;top:14px;left:50%;transform:translateX(-50%);padding:6px 16px;background:var(--bg);border:1px solid rgba(0,175,255,.36);border-radius:20px;backdrop-filter:blur(14px);font-family:var(--fhud);font-size:10px;color:rgba(0,210,255,.9);z-index:100;opacity:0;transition:opacity .3s;white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis}
  #status.on{opacity:1}

  /* BADGE */
  #badge{position:fixed;top:14px;left:14px;display:flex;align-items:center;gap:6px;padding:5px 12px;background:var(--bg);border:1px solid rgba(0,165,255,.28);border-radius:13px;backdrop-filter:blur(12px);font-family:var(--fhud);font-size:9px;color:rgba(0,190,255,.82);z-index:100;opacity:0;transition:opacity .7s;max-width:48vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #badge.on{opacity:1}
  #bdot{width:6px;height:6px;border-radius:50%;animation:blink 1.6s infinite;flex-shrink:0}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.08}}

  /* MAIN PANEL */
  #panel{position:fixed;bottom:80px;left:8px;right:8px;z-index:50;opacity:0;transform:translateY(20px);transition:opacity .55s cubic-bezier(.2,.8,.3,1),transform .55s cubic-bezier(.2,.8,.3,1);pointer-events:none}
  #panel.on{opacity:1;transform:translateY(0);pointer-events:auto}
  .pcard{background:var(--card);border:1.5px solid rgba(0,190,255,.38);border-radius:20px;padding:12px 14px 10px;backdrop-filter:blur(22px);box-shadow:0 0 50px rgba(0,100,255,.11),inset 0 1px 0 rgba(0,215,255,.07);position:relative;overflow:hidden;transition:border-color .5s}
  .pcard::before{content:'';position:absolute;top:0;left:0;right:0;height:1.5px;background:linear-gradient(90deg,transparent,var(--c1) 40%,var(--c1) 60%,transparent)}
  .pcard::after{content:'';position:absolute;left:0;right:0;height:55px;background:linear-gradient(180deg,transparent,rgba(0,140,255,.04),transparent);animation:hscan 4.5s ease-in-out infinite;pointer-events:none}
  @keyframes hscan{0%{top:-55px}100%{top:110%}}
  .hud-bar{display:flex;justify-content:space-between;align-items:center;font-family:var(--fhud);font-size:8px;letter-spacing:1.5px;color:rgba(0,140,200,.38);margin-bottom:9px}
  .hud-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:rgba(0,200,255,.62);margin-right:4px;animation:blink 2s infinite}
  .div{height:1px;margin:7px 0;background:linear-gradient(90deg,transparent,rgba(0,180,255,.2) 30%,rgba(0,180,255,.2) 70%,transparent)}

  /* CHARACTER ROW */
  .char-row{display:flex;align-items:flex-start;gap:12px;margin-bottom:8px}
  .char-av{width:50px;height:70px;flex-shrink:0;animation:charFloat 4s ease-in-out infinite}
  @keyframes charFloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-4px) scale(1.02)}}
  .char-svg{width:100%;height:100%;overflow:visible;filter:drop-shadow(0 0 5px var(--c1))}
  .char-scanline{animation:cScan 2.8s linear infinite}
  @keyframes cScan{0%{transform:translateY(-5px);opacity:.15}50%{opacity:.38}100%{transform:translateY(76px);opacity:.05}}
  .char-core{animation:corePulse 1.4s ease-in-out infinite}
  @keyframes corePulse{0%,100%{opacity:.62;r:2}50%{opacity:1;r:3.2}}
  .char-info{flex:1;min-width:0}
  .char-name{font-family:var(--ftitle);font-size:14px;font-weight:700;color:var(--t1);text-shadow:0 0 14px rgba(0,195,255,.52);letter-spacing:2px;margin-bottom:1px}
  .char-role{font-family:var(--fhud);font-size:8.5px;letter-spacing:1.5px;color:var(--t3);margin-bottom:5px}
  .char-pill{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;background:rgba(0,55,150,.2);border:1px solid rgba(0,130,255,.26);border-radius:7px;font-family:var(--fhud);font-size:7.5px;color:rgba(0,165,255,.68)}
  .char-pill-dot{width:4px;height:4px;border-radius:50%;background:rgba(0,200,255,.62);animation:blink 1.5s infinite}

  /* SPEECH BUBBLE */
  .speech{font-family:var(--fbody);font-size:13.5px;line-height:1.9;color:var(--t2);padding:9px 11px;background:rgba(0,25,70,.26);border-radius:11px;border:1px solid rgba(0,140,255,.14);min-height:40px;margin-bottom:6px;position:relative}
  .cursor{display:inline-block;width:2px;height:13px;background:rgba(0,210,255,.82);margin-left:1px;vertical-align:middle;animation:cur .55s step-end infinite alternate}
  .cursor.done{display:none}
  @keyframes cur{to{background:transparent}}
  #evbadge{display:none;position:absolute;top:-10px;right:10px;padding:2px 9px;background:rgba(0,100,200,.42);border:1px solid rgba(0,180,255,.48);border-radius:8px;font-family:var(--fhud);font-size:8px;letter-spacing:1px;color:rgba(0,220,255,.88);animation:badgePop .3s ease}
  #evbadge.on{display:block}
  @keyframes badgePop{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}

  /* QUICK OPTS */
  .opts{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:5px}
  .opt{font-family:var(--fhud);font-size:8.5px;letter-spacing:.8px;padding:4px 10px;background:rgba(0,45,130,.2);border:1px solid rgba(0,140,255,.28);border-radius:7px;color:rgba(0,175,255,.72);cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent}
  .opt:active{background:rgba(0,80,200,.4);border-color:rgba(0,210,255,.7)}

  /* CHAT ROW */
  .chat-row{display:flex;gap:6px;align-items:center;margin-top:4px}
  #chat-input{flex:1;background:rgba(0,20,60,.42);border:1px solid rgba(0,140,255,.28);border-radius:10px;padding:7px 10px;font-family:var(--fbody);font-size:13px;color:var(--t1);outline:none;-webkit-appearance:none;caret-color:rgba(0,210,255,.88)}
  #chat-input::placeholder{color:rgba(0,160,200,.32);font-size:12px}
  #chat-send{width:36px;height:36px;border-radius:50%;background:rgba(0,60,180,.32);border:1.5px solid rgba(0,160,255,.38);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;-webkit-tap-highlight-color:transparent}
  #chat-send:active{background:rgba(0,100,230,.52);border-color:rgba(0,220,255,.8)}
  #chat-send svg{width:16px;height:16px;fill:rgba(0,200,255,.82)}
  .pfooter{display:flex;justify-content:space-between;align-items:center;margin-top:5px;font-family:var(--fhud);font-size:8px;letter-spacing:1px;color:rgba(0,120,175,.38)}
  .ppill{padding:2px 7px;background:rgba(0,55,160,.18);border:1px solid rgba(0,130,255,.22);border-radius:6px;font-size:7.5px;color:rgba(0,155,255,.58)}

  /* CONTROLS */
  .ctrls{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);z-index:200;display:flex;gap:5px;align-items:flex-end}
  .bcol{display:flex;flex-direction:column;align-items:center;gap:3px}
  .cbtn{width:46px;height:46px;background:rgba(0,7,22,.88);border:1.5px solid rgba(0,168,255,.33);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(14px);transition:all .2s;-webkit-tap-highlight-color:transparent}
  .cbtn:active,.cbtn.on{background:rgba(0,85,205,.4);border-color:rgba(0,225,255,.88);box-shadow:0 0 14px rgba(0,195,255,.28)}
  .cbtn svg{width:19px;height:19px;fill:rgba(0,205,255,.85)}
  .cbtn.ybtn{border-color:rgba(255,190,0,.38)}
  .cbtn.ybtn svg{fill:rgba(255,210,50,.85)}
  .cbtn.ybtn:active{background:rgba(170,120,0,.34);border-color:rgba(255,210,0,.88);box-shadow:0 0 12px rgba(255,190,0,.28)}
  .blbl{font-family:var(--fhud);font-size:8px;color:rgba(0,145,255,.48);white-space:nowrap}
  .blbl.y{color:rgba(255,190,0,.42)}

  /* MISC */
  #flash{position:fixed;inset:0;z-index:5;pointer-events:none;opacity:0;transition:opacity .8s;background:radial-gradient(circle,rgba(0,200,255,.14),transparent 65%)}
  #flash.on{opacity:1}
  #rburst{position:fixed;top:50%;left:50%;width:190px;height:190px;margin:-95px;border-radius:50%;border:2px solid rgba(0,200,255,.62);z-index:6;pointer-events:none;opacity:0}
  #rburst.on{animation:rbst .7s ease-out forwards}
  @keyframes rbst{0%{transform:scale(1);opacity:.8}100%{transform:scale(3.5);opacity:0}}
  #snapflash{position:fixed;inset:0;background:#fff;z-index:9998;pointer-events:none;opacity:0;transition:opacity .12s}
  #snapflash.on{opacity:.7}
  #fsw{position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.97);display:none;align-items:center;justify-content:center;cursor:pointer}
  #fsw.on{display:flex}
  #fsvid{max-width:100%;max-height:100%}
  #dbg{position:fixed;bottom:76px;left:8px;right:8px;max-height:145px;overflow-y:auto;background:rgba(0,0,0,.95);border:1px solid rgba(255,65,65,.26);border-radius:10px;padding:7px;font-family:monospace;font-size:9.5px;z-index:300;display:none}
  #dbg.on{display:block}
  #dbg .ok{color:#88ff88}#dbg .er{color:#ff6666}#dbg .in{color:#88ccff}
  </style>
</head>
<body>

<div id="tap-start">
  <div class="ts-grid"></div>
  <div class="ts-brand">一畫千言 × AI AR PLATFORM</div>
  <div class="ts-portal">
    <div class="ts-ring"></div><div class="ts-ring"></div>
    <div class="ts-ring"></div><div class="ts-ring"></div>
    <div class="ts-center">
      <span class="ts-icon">🪙</span>
      <span class="ts-icon-txt">METAL POSTER</span>
    </div>
  </div>
  <div class="ts-title">AI 即時生成<br>你的 AR 宇宙</div>
  <div class="ts-sub">每次掃描，都是全新體驗</div>
  <div class="ts-flow">
    <div class="ts-step">掃描<br>海報</div><div class="ts-arr">›</div>
    <div class="ts-step">AI<br>生成</div><div class="ts-arr">›</div>
    <div class="ts-step">AR<br>Portal</div><div class="ts-arr">›</div>
    <div class="ts-step">對話<br>互動</div>
  </div>
  <div class="ts-tap">▸ 輕觸任意處啟動</div>
  <div class="ts-loader" id="ts-loader">⬛ 初始化中…</div>
</div>

<canvas id="renderCanvas"></canvas>
<div id="flash"></div>
<div id="rburst"></div>
<div id="snapflash"></div>

<div id="pvfx">
  <div class="pvflash"></div>
  <div class="pvring" style="width:110px;height:110px"></div>
  <div class="pvring"></div>
  <div class="pvring" style="width:300px;height:300px;animation-delay:.28s!important;border-color:rgba(0,80,255,.5)"></div>
</div>

<div id="scan-ov">
  <div class="sbox">
    <div class="sline"></div>
    <div class="corn c-tl"></div><div class="corn c-tr"></div>
    <div class="corn c-bl"></div><div class="corn c-br"></div>
  </div>
  <div id="scan-lbl">AI AR SCAN<br>對準金屬海報</div>
</div>

<div id="badge"><div id="bdot" style="background:#00c8ff"></div><span id="bname">掃描中</span></div>
<div id="status"></div>

<div id="panel">
  <div class="pcard" id="pcard">
    <div class="hud-bar">
      <span><span class="hud-dot"></span>AI AR · CONTENT ENGINE</span>
      <span id="hclock">--:--:--</span>
    </div>
    <div class="div"></div>
    <div class="char-row">
      <div class="char-av" id="charav">
        <svg class="char-svg" id="charsvg" viewBox="0 0 56 90" xmlns="http://www.w3.org/2000/svg">
          <defs><filter id="cg"><feGaussianBlur stdDeviation="1.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
          <polygon points="28,2 40,10 40,26 28,34 16,26 16,10" fill="rgba(0,180,255,.06)" stroke="#00c8ff" stroke-width="1.5" filter="url(#cg)"/>
          <line x1="20" y1="17" x2="26" y2="17" stroke="#00c8ff" stroke-width="1.5" opacity=".9"/>
          <line x1="30" y1="17" x2="36" y2="17" stroke="#00c8ff" stroke-width="1.5" opacity=".9"/>

/* ══ AI ENGINE ══════════════════════════════════════ */
const AIE={
  _key:AR_CONFIG.claudeApiKey||'',

  async generateScene(target,userReq=null){
    if(!this._key){
      const c=DEMOS[Math.floor(Math.random()*DEMOS.length)];
      return JSON.parse(JSON.stringify(c));
    }
    const sys=`你是 AI AR 場景設計師。根據海報生成獨特AR場景。只回傳JSON，不加markdown或說明。JSON格式：{"scene":{"pc":"#hex","sc":"#hex","par":{"n":80-160,"beh":"orbit|spiral|vortex|rain|pulse","spd":0.6-2.0,"sz":0.007-0.015},"rings":[{"r":0.35-0.75,"s":0.004-0.014,"d":1,"c":"#hex","o":0.5-0.85},{"r":0.28-0.60,"s":0.003-0.010,"d":-1,"c":"#hex","o":0.4-0.7}],"special":"aurora|vortex|blackhole|null"},"char":{"name":"3-5字英文","role":"8字內繁中","pc":"#hex","intro":"70-90字繁中詩意科幻自介"},"story":[{"at":0,"txt":"35-45字繁中","ev":null},{"at":8,"txt":"35-45字繁中","ev":"pulse|explode|meteor|vortex|galaxy|null"},{"at":17,"txt":"35-45字繁中","ev":"pulse|meteor|galaxy|null"}]}`;
    const msg=userReq?`重新生成：「${userReq}」海報：${target.productName} 主題：${target.sceneHint}`:`海報：${target.productName}（${target.productInfo}）主題：${target.sceneHint}`;
    try{
      const r=await this._call(sys,msg,250);
      const txt=r.content?.[0]?.text?.trim().replace(/```json|```/g,'').trim()||'';
      return JSON.parse(txt);
    }catch(e){D.log('AI scene err:'+e.message,'er');return JSON.parse(JSON.stringify(DEMOS[Math.floor(Math.random()*DEMOS.length)]));}
  },

  async chat(msg,name,role){
    const quickMap={scene:'生成全新AR場景',story:'說一個關於這幅海報的神祕故事',tech:'介紹昇華金屬印刷工藝細節',mystery:'透露這幅海報隱藏的秘密'};
    const resolved=quickMap[msg]||msg;
    if(!this._key){
      await new Promise(r=>setTimeout(r,650));
      const ds=[
        {text:'收到！AI 正在為你重新設計這個宇宙——每次掃描都是一個全新維度。',ev:'explode'},
        {text:'這塊金屬板在特定角度反射的光，正好是某顆恆星的特徵波長。巧合嗎？',ev:'meteor'},
        {text:'昇華印刷是一種魔法：200°C讓墨水以氣態穿透鋁板，永久融合。',ev:'aurora'},
        {text:'每一次掃描，我都在重新解讀這幅畫。今天它告訴我：自由是無限的。',ev:'vortex'},
        {text:'這幅海報的主人，注定會踏上一段無法預知的旅程。你準備好了嗎？',ev:'pulse'},
      ];
      return ds[Math.floor(Math.random()*ds.length)];
    }
    const sys=`你是名為「${name}」的AI全息導航員（${role}）。繁體中文回覆。只回傳JSON：{"text":"50-70字，充滿個性與詩意","ev":"meteor|explode|vortex|galaxy|aurora|blackhole|pulse|null"}`;
    try{
      const r=await this._call(sys,resolved,130);
      const txt=r.content?.[0]?.text?.trim().replace(/```json|```/g,'').trim()||'';
      return JSON.parse(txt);
    }catch(e){D.log('AI chat err:'+e.message,'er');return{text:'訊號干擾中…請稍後再試。',ev:null};}
  },

  async _call(sys,msg,max){
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':this._key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:max,system:sys,messages:[{role:'user',content:msg}]})});
    if(!res.ok)throw new Error('HTTP'+res.status);
    return res.json();
  },
};

/* ══ SCENE RENDERER ════════════════════════════════ */
const SR={
  _g:null,_pts:null,_rings:[],_meta:[],_beh:'orbit',_prevBeh:'orbit',_cfg:null,_frm:0,_evTimer:null,

  apply(cfg,group){
    this._cfg=cfg.scene; this._g=group; this._clear();
    this._buildPts(cfg.scene); this._buildRings(cfg.scene);
  },
  _clear(){
    if(!this._g)return;
    while(this._g.children.length)this._g.remove(this._g.children[0]);
    this._pts=null;this._rings=[];
  },
  _buildPts(sc){
    const n=sc.par.n,pos=new Float32Array(n*3);
    this._meta=[];
    for(let i=0;i<n;i++){
      const a=Math.random()*Math.PI*2,r=.25+Math.random()*.55,h=(Math.random()-.5)*.45;
      pos[i*3]=Math.cos(a)*r;pos[i*3+1]=h;pos[i*3+2]=Math.sin(a)*r;
      this._meta.push({a,r,h,baseR:r,phase:Math.random()*Math.PI*2,da:(Math.random()>.5?1:-1)*(.008+Math.random()*.012)*sc.par.spd,dh:(Math.random()-.5)*.004});
    }
    const g=new THREE.BufferGeometry();
    g.setAttribute('position',new THREE.BufferAttribute(pos,3));
    this._pts=new THREE.Points(g,new THREE.PointsMaterial({color:new THREE.Color(sc.pc),size:sc.par.sz,transparent:true,opacity:.85}));
    this._beh=sc.par.beh;
    this._g.add(this._pts);
  },
  _buildRings(sc){
    sc.rings.forEach(rc=>{
      const m=new THREE.Mesh(new THREE.TorusGeometry(rc.r,.004,6,64),new THREE.MeshBasicMaterial({color:new THREE.Color(rc.c),transparent:true,opacity:rc.o}));
      m.rotation.x=Math.PI/2;m.userData.spd=rc.s*rc.d;
      this._rings.push(m);this._g.add(m);
    });
  },
  tick(){
    this._frm++;
    this._rings.forEach(r=>{r.rotation.z+=r.userData.spd});
    if(!this._pts)return;
    const pos=this._pts.geometry.attributes.position.array,n=this._meta.length,b=this._beh,f=this._frm;
    for(let i=0;i<n;i++){
      const m=this._meta[i];
      if(b==='orbit'){m.a+=m.da;pos[i*3]=Math.cos(m.a)*m.r;pos[i*3+2]=Math.sin(m.a)*m.r;pos[i*3+1]=Math.sin(m.phase+f*.008)*.1}
      else if(b==='spiral'){m.a+=m.da;m.r+=.0003;if(m.r>.9){m.r=.15;m.a=Math.random()*Math.PI*2}pos[i*3]=Math.cos(m.a)*m.r;pos[i*3+2]=Math.sin(m.a)*m.r;pos[i*3+1]=Math.sin(m.phase+f*.01)*.12}
      else if(b==='vortex'){m.a+=m.da*2;m.r=Math.max(.03,m.r-.002);if(m.r<.06){m.r=.7+Math.random()*.2;m.a=Math.random()*Math.PI*2}pos[i*3]=Math.cos(m.a)*m.r;pos[i*3+2]=Math.sin(m.a)*m.r;pos[i*3+1]=m.h}
      else if(b==='rain'){pos[i*3+1]-=.015*Math.abs(m.da/.01);if(pos[i*3+1]<-.75){pos[i*3]=(Math.random()-.5)*1.4;pos[i*3+1]=.75;pos[i*3+2]=(Math.random()-.5)*1.4}}
      else if(b==='pulse'){m.phase+=.035;const pr=m.baseR*(.6+Math.sin(m.phase)*.45);pos[i*3]=Math.cos(m.a)*pr;pos[i*3+2]=Math.sin(m.a)*pr;pos[i*3+1]=Math.cos(m.phase*.7)*.18}
      else if(b==='galaxy'){m.a+=m.da*.5;const arm=i<n/2?0:Math.PI,armA=m.a+arm+m.baseR*.8;pos[i*3]=Math.cos(armA)*m.baseR;pos[i*3+2]=Math.sin(armA)*m.baseR;pos[i*3+1]=Math.sin(m.phase+f*.006)*.06}
    }
    this._pts.geometry.attributes.position.needsUpdate=true;
  },
  triggerEvent(type,dur=5500){
    if(!this._pts&&type!=='pulse')return;
    clearTimeout(this._evTimer);
    this._prevBeh=this._beh;
    D.log('✨ event: '+type,'in');
    if(type==='explode'){
      const pos=this._pts.geometry.attributes.position.array,n=this._meta.length;
      const targets=[];
      for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,e=Math.PI*(Math.random()-.5),r=.5+Math.random()*.7;targets.push({x:Math.cos(a)*Math.cos(e)*r,y:Math.sin(e)*r,z:Math.sin(a)*Math.cos(e)*r})}
      const t0=Date.now(),animEx=()=>{if(!this._pts)return;const dt=(Date.now()-t0)/1300;if(dt>=1)return;const p2=this._pts.geometry.attributes.position.array;for(let i=0;i<n;i++){p2[i*3]+=(targets[i].x-p2[i*3])*.14;p2[i*3+1]+=(targets[i].y-p2[i*3+1])*.14;p2[i*3+2]+=(targets[i].z-p2[i*3+2])*.14}this._pts.geometry.attributes.position.needsUpdate=true;requestAnimationFrame(animEx)};
      animEx();return;
    }
    if(type==='pulse'&&this._g){
      const geo=new THREE.TorusGeometry(.55,.006,6,64),mat=new THREE.MeshBasicMaterial({color:new THREE.Color(this._cfg?.pc||'#00c8ff'),transparent:true,opacity:.9});
      const ring=new THREE.Mesh(geo,mat);ring.rotation.x=Math.PI/2;this._g.add(ring);
      let t=0;const ap=()=>{t+=.042;ring.scale.setScalar(1+t*2.8);mat.opacity=Math.max(0,.9-t);if(t<1&&mat.opacity>0)requestAnimationFrame(ap);else this._g.remove(ring)};ap();return;
    }
    const bmap={meteor:'rain',vortex:'vortex',galaxy:'galaxy',aurora:'pulse',blackhole:'vortex'};
    if(bmap[type]){this._beh=bmap[type];this._evTimer=setTimeout(()=>{this._beh=this._prevBeh},dur)}
  },
  setColor(hex){if(this._pts)this._pts.material.color.set(hex);if(this._rings[0])this._rings[0].material.color.set(hex)},
};

/* ══ STORY ENGINE ═══════════════════════════════════ */
const Story={
  _beats:[],_start:null,_idx:0,_active:false,_timer:null,
  begin(beats){this._beats=beats;this._start=Date.now();this._idx=0;this._active=true;this._tick()},
  stop(){this._active=false;clearTimeout(this._timer)},
  _tick(){
    if(!this._active||this._idx>=this._beats.length)return;
    const el=(Date.now()-this._start)/1000,b=this._beats[this._idx];
    if(el>=b.at){Panel.speak(b.txt);if(b.ev)SR.triggerEvent(b.ev);this._idx++}
    this._timer=setTimeout(()=>this._tick(),400);
  },
};

/* ══ UI HELPERS ═════════════════════════════════════ */
let _stTmr;
function showSt(m,d=2800){const e=document.getElementById('status');e.textContent=m;e.classList.add('on');clearTimeout(_stTmr);_stTmr=setTimeout(()=>e.classList.remove('on'),d)}
function doFlash(){const f=document.getElementById('flash');f.classList.add('on');setTimeout(()=>f.classList.remove('on'),900)}
function doBurst(){const r=document.getElementById('rburst');r.classList.remove('on');void r.offsetWidth;r.classList.add('on')}
function portalVFX(){const v=document.getElementById('pvfx');v.classList.add('on');v.querySelectorAll('.pvring').forEach((r,i)=>{r.classList.remove('burst');void r.offsetWidth;setTimeout(()=>r.classList.add('burst'),i*110)});setTimeout(()=>v.classList.remove('on'),1600)}
function setBadge(name,color,show){document.getElementById('bdot').style.background=color;document.getElementById('bname').textContent=name;document.getElementById('badge').classList.toggle('on',show)}
function setThemeColor(hex){
  document.documentElement.style.setProperty('--c1',hex);
  document.querySelectorAll('#charsvg [stroke="#00c8ff"]').forEach(el=>el.setAttribute('stroke',hex));
  const cc=document.getElementById('ccore');if(cc)cc.setAttribute('fill',hex);
  document.getElementById('pcard').style.borderColor=hex+'60';
}

/* ══ PANEL ══════════════════════════════════════════ */
const Panel={
  _t:null,
  init(){setInterval(()=>{document.getElementById('hclock').textContent=new Date().toLocaleTimeString('zh-TW',{hour12:false})},1000)},
  show(){document.getElementById('panel').classList.add('on')},
  hide(){document.getElementById('panel').classList.remove('on')},
  toggle(){document.getElementById('panel').classList.toggle('on')},
  setMode(m){document.getElementById('ppill').textContent=m},
  setFooter(t){document.getElementById('pfooter-l').textContent=t},
  setChar(name,role,color){document.getElementById('cname').textContent=name;document.getElementById('crole').textContent=role;document.getElementById('cpilltxt').textContent='HOLOGRAM ACTIVE';setThemeColor(color)},
  showEvBadge(type){const b=document.getElementById('evbadge');const L={meteor:'☄ 流星雨',explode:'💥 爆炸',vortex:'🌀 漩渦',galaxy:'🌌 星系',aurora:'🌈 極光',blackhole:'⚫ 黑洞',pulse:'💠 脈衝'};b.textContent=L[type]||type;b.classList.add('on');setTimeout(()=>b.classList.remove('on'),3500)},
  speak(txt){
    clearTimeout(this._t);
    const el=document.getElementById('speech-txt'),cur=document.getElementById('cursor');
    el.textContent='';cur.classList.remove('done');
    document.getElementById('quick-opts').style.display='none';
    let i=0;
    const go=()=>{if(i>=txt.length){cur.classList.add('done');this.setFooter('◉ AI READY');document.getElementById('quick-opts').style.display='flex';return}el.textContent+=txt[i++];this._t=setTimeout(go,26)};
    this.setFooter('◉ AI SPEAKING…');go();
  },
};

/* ══ GYRO ════════════════════════════════════════════ */
const Gyro={beta:0,gamma:0,_rb:0,_rg:0,_bb:null,_bg:null,
  init(){window.addEventListener('deviceorientation',e=>{this._rb=e.beta||0;this._rg=e.gamma||0;if(this._bb!==null){this.beta+=((this._rb-this._bb)-this.beta)*.08;this.gamma+=((this._rg-this._bg)-this.gamma)*.08;this.beta=Math.max(-20,Math.min(20,this.beta));this.gamma=Math.max(-20,Math.min(20,this.gamma))}},true)},
  calibrate(){this._bb=this._rb;this._bg=this._rg;this.beta=0;this.gamma=0},
  offset(s){return{x:this.gamma*.003*s,y:-this.beta*.003*s}},
};

/* ══ SCREENSHOT ══════════════════════════════════════ */
const Snap={
  _p:false,_s:null,_o:null,_c:null,
  init(canvas){this._s=canvas;this._o=document.createElement('canvas');this._c=this._o.getContext('2d');document.getElementById('snap-col').style.display='flex';document.getElementById('bbsnap').addEventListener('click',()=>this.capture())},
  tick(){if(!this._p||!this._s)return;this._p=false;try{this._o.width=this._s.width;this._o.height=this._s.height;this._c.drawImage(this._s,0,0);this._share(this._o.toDataURL('image/jpeg',.92))}catch(e){D.log('截圖失敗:'+e.message,'er')}},
  capture(){const sf=document.getElementById('snapflash');sf.classList.add('on');setTimeout(()=>sf.classList.remove('on'),280);this._p=true;showSt('📸 擷取中…',1500)},
  async _share(dataUrl){const blob=await(await fetch(dataUrl)).blob();const file=new File([blob],'ar.jpg',{type:'image/jpeg'});if(navigator.share&&navigator.canShare?.({files:[file]})){try{await navigator.share({files:[file],title:'一畫千言 AI AR',text:'AI 生成的 AR 宇宙 ✨'});showSt('✅ 分享成功！');return}catch{}}const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='ar-'+Date.now()+'.jpg';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);showSt('✅ 截圖已儲存')},
};

/* ══ GLOBAL STATE ════════════════════════════════════ */
const G={vis:false,aiDone:false,everFound:false,currentTarget:null};

/* ══ AR MODULE ═══════════════════════════════════════ */
function mkARModule(allTargetData){
  const targetMap={};
  AR_CONFIG.targets.forEach((cfg,i)=>{const name=allTargetData[i].name;targetMap[name]=cfg;D.log(`target:"${name}"→"${cfg.productName}"`,'ok')});

  let vEl,vTex,vMesh,hGrp;
  const st={play:false,mute:true,fs:false,holo:true};
  const scanEl=document.getElementById('scan-ov');
  const fsW=document.getElementById('fsw'),fsV=document.getElementById('fsvid');

  function mkVid(src){const v=document.createElement('video');v.src=src;v.loop=true;v.muted=true;v.playsInline=true;v.crossOrigin='anonymous';v.setAttribute('webkit-playsinline','true');v.addEventListener('canplay',()=>D.log('canplay','ok'));return v}
  async function playV(v){if(!v)return;try{await v.play()}catch{v.muted=true;await v.play().catch(()=>{})}}
  function pauseV(v){if(v)v.pause()}
  function enterFS(){if(!vEl)return;fsV.src=vEl.src;fsV.currentTime=vEl.currentTime;fsV.muted=st.mute;fsW.classList.add('on');st.fs=true;playV(fsV)}
  function exitFS(){if(!st.fs)return;if(vEl)vEl.currentTime=fsV.currentTime;fsW.classList.remove('on');st.fs=false;pauseV(fsV);fsV.src=''}
  function uI(){document.getElementById('bpp-i').style.display=st.play?'none':'block';document.getElementById('bpa-i').style.display=st.play?'block':'none';document.getElementById('bbp').classList.toggle('on',st.play);document.getElementById('bsm-i').style.display=st.mute?'block':'none';document.getElementById('bss-i').style.display=st.mute?'none':'block';document.getElementById('bbs').classList.toggle('on',!st.mute)}
  function applyPose(d){const{position:p,rotation:r,scale:s}=d;vMesh.position.set(p.x,p.y,p.z);vMesh.quaternion.set(r.x,r.y,r.z,r.w);vMesh.scale.setScalar(s);hGrp.position.set(p.x,p.y,p.z);hGrp.quaternion.set(r.x,r.y,r.z,r.w);hGrp.scale.setScalar(s)}

  async function triggerAIScene(target,userReq=null){
    G.aiDone=true;
    Panel.show();Panel.setMode('AI GENERATING');Panel.setFooter('◉ AI 生成中…');
    document.getElementById('speech-txt').textContent='⬛ AI 正在為你設計專屬宇宙…';
    document.getElementById('cursor').classList.remove('done');
    document.getElementById('quick-opts').style.display='none';
    const cfg=await AIE.generateScene(target,userReq);
    G.currentCfg=cfg;
    SR.apply(cfg,hGrp);
    Panel.setChar(cfg.char.name,cfg.char.role,cfg.char.pc);
    setBadge(target.productName,cfg.char.pc,true);
    Panel.setMode('PORTAL OPEN');Panel.setFooter('◉ PORTAL ACTIVE');
    Panel.speak(cfg.char.intro);
    setTimeout(()=>{Story.stop();Story.begin(cfg.story)},3000+cfg.char.intro.length*26);
    showSt('🌌 AI 場景已生成 · '+cfg.char.name+' 上線',4000);
    D.log('場景生成: '+cfg.char.name,'ok');
  }

  async function handleChat(message){
    if(!G.everFound){showSt('請先掃描目標');return}
    const ci=document.getElementById('chat-input');ci.value='';ci.blur();
    const name=document.getElementById('cname').textContent;
    const role=document.getElementById('crole').textContent;
    Story.stop();Panel.setMode('AI THINKING');
    document.getElementById('speech-txt').textContent='⬛ '+name+' 思考中…';
    document.getElementById('cursor').classList.remove('done');
    document.getElementById('quick-opts').style.display='none';
    const resp=await AIE.chat(message,name,role);
    Panel.speak(resp.text);
    const ev=resp.ev||resp.visualEvent;
    if(ev&&ev!=='null'){SR.triggerEvent(ev);Panel.showEvBadge(ev);showSt('✨ '+ev+' 效果啟動')}
    const sceneWords=['新場景','新宇宙','換場景','重新生成','regenerate','換一個','另一個'];
    if(sceneWords.some(w=>message.toLowerCase().includes(w))&&G.currentTarget){
      setTimeout(()=>{G.aiDone=false;portalVFX();doFlash();triggerAIScene(G.currentTarget,message)},1800)
    }
    Panel.setMode('IMG LOCK');
  }

  function setupBtns(){
    document.getElementById('bbp').addEventListener('click',()=>{
      if(!G.everFound){showSt('請先掃描目標');return}
      st.play=!st.play;uI();
      if(st.play){if(!G.vis){enterFS();scanEl.classList.add('hidden')}else if(vEl?.paused)playV(vEl);showSt('▶ 播放中')}
      else{exitFS();if(!G.vis&&vEl)pauseV(vEl);if(!G.vis)scanEl.classList.remove('hidden');showSt('⏸ 暫停')}
    });
    document.getElementById('bbs').addEventListener('click',()=>{st.mute=!st.mute;if(vEl)vEl.muted=st.mute;fsV.muted=st.mute;uI();showSt(st.mute?'🔇 靜音':'🔊 ON')});
    document.getElementById('bbregen').addEventListener('click',async()=>{
      if(!G.everFound||!G.currentTarget){showSt('請先掃描目標');return}
      document.getElementById('bbregen').classList.add('on');
      G.aiDone=false;Story.stop();portalVFX();doFlash();
      await triggerAIScene(G.currentTarget);
      document.getElementById('bbregen').classList.remove('on');
    });
    document.getElementById('bbh').addEventListener('click',()=>{
      st.holo=!st.holo;if(hGrp)hGrp.visible=st.holo&&G.vis;
      st.holo?Panel.show():Panel.hide();
      document.getElementById('bbh').classList.toggle('on',st.holo);
      showSt(st.holo?'🔷 全息 ON':'🔲 OFF');
    });
    fsW.addEventListener('click',()=>{exitFS();st.play=false;uI();if(!G.vis)scanEl.classList.remove('hidden')});
    document.getElementById('quick-opts').addEventListener('click',e=>{const q=e.target.closest('.opt')?.dataset.q;if(q)handleChat(q)});
    const ci=document.getElementById('chat-input');
    document.getElementById('chat-send').addEventListener('click',()=>{const m=ci.value.trim();if(m)handleChat(m)});
    ci.addEventListener('keydown',e=>{if(e.key==='Enter'){const m=ci.value.trim();if(m)handleChat(m)}});
  }

  async function onFound({detail}){
    const name=detail.name,target=targetMap[name];
    if(!target){D.log('⚠ 未知目標:'+name,'in');return}
    D.log(`✅ found "${name}"`,'ok');
    G.currentTarget=target;
    applyPose(detail);
    vMesh.visible=true;hGrp.visible=st.holo;
    G.vis=true;G.everFound=true;
    scanEl.classList.add('hidden');
    doFlash();doBurst();portalVFX();
    setBadge(target.productName,'#00c8ff',true);
    showSt('🌀 Portal 開啟 · AI 生成中…');
    Gyro.calibrate();if(st.fs)exitFS();playV(vEl);
    if(!G.aiDone)await triggerAIScene(target);
  }
  function onUpdated({detail}){applyPose(detail);if(!G.vis){G.vis=true;vMesh.visible=true;hGrp.visible=st.holo;scanEl.classList.add('hidden')}}
  function onLost(){D.log('lost','in');G.vis=false;vMesh.visible=false;hGrp.visible=false;scanEl.classList.remove('hidden');setBadge('掃描中…','#556',true);showSt('🔍 重新對準海報')}

  return{
    name:'ar-holo',
    onStart:()=>{
      const{scene,renderer}=XR8.Threejs.xrScene();
      renderer.autoClear=false;
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth,window.innerHeight,false);
      renderer.domElement.style.cssText='position:fixed!important;top:0!important;left:0!important;width:100vw!important;height:100vh!important;z-index:0!important;';
      Snap.init(renderer.domElement);
      D.log('Renderer '+window.innerWidth+'x'+window.innerHeight,'ok');
      vEl=mkVid(AR_CONFIG.targets[0].videoSrc);
      vTex=new THREE.VideoTexture(vEl);vTex.minFilter=vTex.magFilter=THREE.LinearFilter;vTex.format=THREE.RGBAFormat;
      vMesh=new THREE.Mesh(new THREE.PlaneGeometry(1,1/AR_CONFIG.targets[0].videoAspectRatio),new THREE.MeshBasicMaterial({map:vTex,side:THREE.DoubleSide,toneMapped:false}));
      vMesh.visible=false;scene.add(vMesh);
      hGrp=new THREE.Group();hGrp.visible=false;scene.add(hGrp);
      SR._g=hGrp;
      scene.add(new THREE.AmbientLight(0xffffff,1));
      Panel.init();setupBtns();Gyro.init();
      D.log('✅ Scene ready','ok');
      setTimeout(()=>showSt('對準金屬海報，AI 將生成專屬宇宙',4000),700);
    },
    onUpdate:()=>{
      SR.tick();
      if(G.vis&&hGrp.visible&&hGrp.scale.x){const ofs=Gyro.offset(hGrp.scale.x);hGrp.position.x+=ofs.x*.12;hGrp.position.y+=ofs.y*.12}
      Snap.tick();
    },
    listeners:[
      {event:'reality.imagefound',   process:onFound},
      {event:'reality.imageupdated', process:onUpdated},
      {event:'reality.imagelost',    process:onLost},
    ],
    onAttach:()=>{
      window.addEventListener('resize',()=>{const{renderer}=XR8.Threejs.xrScene();renderer.setSize(window.innerWidth,window.innerHeight,false)});
      document.addEventListener('visibilitychange',()=>{if(document.hidden){if(vEl)pauseV(vEl)}else if(G.vis&&vEl)playV(vEl)});
    }
  };
}

/* ══ BOOT ════════════════════════════════════════════ */
let _allTargets=null,_xrReady=false,_booted=false;
window.addEventListener('xrloaded',()=>{_xrReady=true;D.log('✅ xrloaded','ok')});

async function preloadTargets(){
  const res=[];
  for(const[i,cfg]of AR_CONFIG.targets.entries()){
    try{const r=await fetch(cfg.jsonPath);if(!r.ok)throw new Error('HTTP'+r.status);res.push(await r.json());D.log(`target[${i}] OK`,'ok')}
    catch(e){D.log(`target[${i}] 失敗:`+e.message,'er');res.push(null)}
  }
  _allTargets=res.filter(Boolean);return _allTargets.length>0;
}

async function reqPermissions(){
  for(const Ev of[DeviceMotionEvent,DeviceOrientationEvent])
    if(typeof Ev!=='undefined'&&typeof Ev.requestPermission==='function')
      try{await Ev.requestPermission()}catch{}
}

async function startXR8(){
  let w=0;
  while(!_allTargets&&w<10000){await new Promise(r=>setTimeout(r,200));w+=200}
  if(!_allTargets?.length){showSt('❌ 目標資料未就緒',8000);return}
  w=0;
  while(!_xrReady&&w<12000){await new Promise(r=>setTimeout(r,200));w+=200}
  if(!_xrReady){showSt('❌ AR 引擎未就緒',8000);return}
  XR8.XrController.configure({disableWorldTracking:true,imageTargetData:_allTargets});
  D.log('XrController 設定完成，targets='+_allTargets.length,'ok');
  XR8.addCameraPipelineModules([XR8.GlTextureRenderer.pipelineModule(),XR8.Threejs.pipelineModule(),XR8.XrController.pipelineModule(),mkARModule(_allTargets)]);
  XR8.run({canvas:document.getElementById('renderCanvas')});
  D.log('✅ XR8.run()','ok');
}

async function boot(){
  if(_booted)return;_booted=true;
  const L=document.getElementById('ts-loader');
  L.textContent='⬛ 請求授權…';L.classList.add('on');
  await reqPermissions();
  L.textContent='⬛ 啟動 AI AR 引擎…';
  const o=document.getElementById('tap-start');o.style.opacity='0';setTimeout(()=>o.style.display='none',950);
  await startXR8();
}

document.getElementById('tap-start').addEventListener('click',boot);
document.getElementById('tap-start').addEventListener('touchend',e=>{e.preventDefault();boot()},{passive:false});

window.addEventListener('xrerror',e=>{D.log('❌ xrerror:'+JSON.stringify(e.detail),'er');document.getElementById('dbg').classList.add('on');showSt('❌ AR 引擎錯誤',10000)});
window.addEventListener('load',()=>{preloadTargets();/* preflight optional */});
</script>
