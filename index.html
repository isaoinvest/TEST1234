<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>AR 全息體驗</title>
  <script>
    const AR_CONFIG = {
      videoSrc:         'https://pub-ac80c6d0a305452bbe0bdfcec65b6a2c.r2.dev/Pirate%20ship.mp4',
      targetJsonPath:   './image-targets/shoptarget.json',
      videoAspectRatio: 16 / 9,
      claudeApiKey:     '', // 填入你的 API Key
      productName:      '海賊船金屬海報',
      productInfo:      '一畫千言品牌，昇華金屬板印刷工藝，高解析度海賊船主題藝術海報，色彩永久定著於鋁板',
      enableHoloRings:  true,
      enableHoloParticles: true,
    };
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="./external/xr/xr.js" data-preload-chunks="slam"></script>
  
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:none}
    #renderCanvas{position:fixed!important;top:0!important;left:0!important;width:100vw!important;height:100vh!important;z-index:0;display:block}
    [class*="watermark"],[id*="watermark"],[class*="xr8"],[id*="xr8"],[class*="poweredby"],[id*="powered"]{display:none!important}

    /* 原本的 UI CSS 完整保留 */
    #scan-ov{position:fixed;top:0;left:0;width:100%;height:100%;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:44px;pointer-events:none;background:rgba(0,0,0,0.2);opacity:1;transition:opacity 0.6s}
    #scan-ov.hidden{opacity:0}
    .sbox{width:230px;height:230px;position:relative;border:2px solid rgba(0,220,255,0.4);border-radius:14px;box-shadow:0 0 30px rgba(0,220,255,0.15)}
    .sline{position:absolute;height:2px;width:100%;top:0;background:linear-gradient(90deg,transparent,#00eeff 30%,#00eeff 70%,transparent);animation:scan 2s ease-in-out infinite;box-shadow:0 0 10px rgba(0,238,255,0.8)}
    .corn{position:absolute;width:22px;height:22px;border-color:rgba(0,238,255,0.9);border-style:solid;border-width:0}
    .c-tl{top:-2px;left:-2px;border-top-width:3px;border-left-width:3px;border-radius:5px 0 0 0}
    .c-tr{top:-2px;right:-2px;border-top-width:3px;border-right-width:3px;border-radius:0 5px 0 0}
    .c-bl{bottom:-2px;left:-2px;border-bottom-width:3px;border-left-width:3px;border-radius:0 0 0 5px}
    .c-br{bottom:-2px;right:-2px;border-bottom-width:3px;border-right-width:3px;border-radius:0 0 5px 0}
    #slam-hint{font-family:monospace;font-size:11px;letter-spacing:2px;color:rgba(0,220,255,0.8);text-align:center;line-height:2;animation:pulse 2s infinite}

    @keyframes scan{0%{transform:translateY(0)}50%{transform:translateY(225px)}100%{transform:translateY(0)}}
    @keyframes pulse{0%,100%{opacity:0.9}50%{opacity:0.25}}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0.1}}
    @keyframes typing{to{border-color:transparent}}

    #slam-badge{position:fixed;top:14px;left:14px;display:flex;align-items:center;gap:7px;padding:6px 13px;background:rgba(0,8,20,0.88);border:1px solid rgba(0,200,80,0.5);border-radius:14px;backdrop-filter:blur(8px);font-family:monospace;font-size:10px;color:rgba(0,200,80,0.9);z-index:100;opacity:0;transition:opacity 0.8s}
    #slam-badge.show{opacity:1}
    #slam-dot{width:7px;height:7px;background:#00c850;border-radius:50%;animation:blink 1.6s infinite;flex-shrink:0}
    #status{position:fixed;top:14px;left:50%;transform:translateX(-50%);padding:7px 16px;background:rgba(0,5,18,0.9);border:1px solid rgba(0,180,255,0.4);border-radius:20px;backdrop-filter:blur(10px);font-family:monospace;font-size:11px;color:rgba(0,210,255,0.95);z-index:100;opacity:0;transition:opacity 0.3s;white-space:nowrap}
    #status.show{opacity:1}
    #flash{position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle,rgba(0,210,255,0.12),transparent 68%);z-index:5;pointer-events:none;opacity:0;transition:opacity 0.8s}
    #flash.active{opacity:1}

    #holo-panel{position:fixed;bottom:90px;left:10px;right:10px;z-index:50;opacity:0;transform:translateY(20px);transition:opacity 0.5s,transform 0.5s;pointer-events:none}
    #holo-panel.show{opacity:1;transform:translateY(0);pointer-events:auto}
    .hcard{background:linear-gradient(160deg,rgba(0,14,42,0.97),rgba(0,5,20,0.98));border:1.5px solid rgba(0,190,255,0.5);border-radius:18px;padding:16px 18px 14px;backdrop-filter:blur(18px);box-shadow:0 0 50px rgba(0,140,255,0.2),inset 0 1px 0 rgba(0,220,255,0.1);position:relative;overflow:hidden}
    .hcard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(0,200,255,0.7) 40%,rgba(0,200,255,0.7) 60%,transparent)}
    .hsysbar{display:flex;justify-content:space-between;margin-bottom:8px;font-family:monospace;font-size:9px;letter-spacing:1.5px;color:rgba(0,160,255,0.5)}
    .hsdot{display:inline-block;width:5px;height:5px;background:rgba(0,210,255,0.7);border-radius:50%;margin-right:5px;animation:blink 2s infinite}
    .hdiv{height:1px;margin:7px 0;background:linear-gradient(90deg,transparent,rgba(0,190,255,0.3) 30%,rgba(0,190,255,0.3) 70%,transparent)}
    .htitle{font-size:21px;font-weight:700;color:rgba(230,248,255,1);text-shadow:0 0 18px rgba(0,200,255,0.65);letter-spacing:1px;margin-bottom:3px}
    .hbrand{font-family:monospace;font-size:9px;letter-spacing:2.5px;color:rgba(0,160,255,0.55);margin-bottom:10px}
    .htext{font-size:15px;line-height:1.8;color:rgba(210,242,255,0.92);min-height:48px}
    .hcursor{display:inline-block;width:2px;height:15px;background:rgba(0,220,255,0.9);margin-left:2px;vertical-align:middle;animation:typing 0.6s step-end infinite alternate}
    .hcursor.done{display:none}
    .hfooter{display:flex;justify-content:space-between;align-items:center;margin-top:10px;font-family:monospace;font-size:9px;letter-spacing:1px;color:rgba(0,140,200,0.5)}
    .hpill{padding:2px 8px;background:rgba(0,70,180,0.25);border:1px solid rgba(0,150,255,0.3);border-radius:7px;font-size:9px;color:rgba(0,175,255,0.7)}

    .ctrl-row{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:200;display:flex;gap:10px;align-items:flex-end}
    .btn-col{display:flex;flex-direction:column;align-items:center;gap:4px}
    .cbtn{width:52px;height:52px;background:rgba(0,8,24,0.85);border:1.5px solid rgba(0,175,255,0.4);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(10px);transition:all 0.2s}
    .cbtn:active,.cbtn.active{background:rgba(0,95,215,0.45);border-color:rgba(0,230,255,0.95);box-shadow:0 0 14px rgba(0,200,255,0.3)}
    .cbtn svg{width:22px;height:22px;fill:rgba(0,210,255,0.9)}
    .blbl{font-family:monospace;font-size:9px;color:rgba(0,155,255,0.6);white-space:nowrap}

    #fs-wrap{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:999;background:rgba(0,0,0,0.97);display:none;align-items:center;justify-content:center;cursor:pointer}
    #fs-wrap.show{display:flex}
    #fs-vid{max-width:100%;max-height:100%}
  </style>
</head>
<body>
  <canvas id="renderCanvas"></canvas>
  <div id="flash"></div>

  <div id="scan-ov">
    <div class="sbox">
      <div class="sline"></div>
      <div class="corn c-tl"></div><div class="corn c-tr"></div>
      <div class="corn c-bl"></div><div class="corn c-br"></div>
    </div>
    <div id="slam-hint">SLAM + IMAGE TRACKING<br>請緩慢移動手機掃描環境<br>再對準目標圖像</div>
  </div>

  <div id="slam-badge"><div id="slam-dot"></div><span id="slam-txt">SLAM 初始化中</span></div>
  <div id="status"></div>

  <div id="holo-panel">
    <div class="hcard">
      <div class="hsysbar">
        <span><span class="hsdot"></span>AR · AI SYSTEM ONLINE</span>
        <span id="hclock">--:--:--</span>
      </div>
      <div class="hdiv"></div>
      <div class="htitle" id="holo-title">海賊船金屬海報</div>
      <div class="hbrand">一畫千言 × AI NARRATOR</div>
      <div class="hdiv"></div>
      <div class="htext">
        <span id="holo-content">⬛ 正在初始化 AI 導覽…</span><span class="hcursor" id="holo-cur"></span>
      </div>
      <div class="hfooter">
        <span id="hfooter-l">◉ SLAM ANCHORED</span>
        <span class="hpill" id="hpill">IMG LOCK</span>
      </div>
    </div>
  </div>

  <div id="fs-wrap"><video id="fs-vid" playsinline webkit-playsinline loop></video></div>

  <div class="ctrl-row">
    <div class="btn-col">
      <button class="cbtn" id="bp">
        <svg id="ipp" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        <svg id="ipa" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button><span class="blbl">播放</span>
    </div>
    <div class="btn-col">
      <button class="cbtn" id="bs">
        <svg id="ism" viewBox="0 0 24 24"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
        <svg id="iss" viewBox="0 0 24 24" style="display:none"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
      </button><span class="blbl">音效</span>
    </div>
    <div class="btn-col">
      <button class="cbtn" id="bai">
        <svg viewBox="0 0 24 24"><path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7h1a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1v1a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-1H2a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h1a7 7 0 0 1 7-7h1V5.73c-.6-.34-1-.99-1-1.73a2 2 0 0 1 2-2M7.5 13A2.5 2.5 0 0 0 5 15.5 2.5 2.5 0 0 0 7.5 18 2.5 2.5 0 0 0 10 15.5 2.5 2.5 0 0 0 7.5 13m9 0a2.5 2.5 0 0 0-2.5 2.5 2.5 2.5 0 0 0 2.5 2.5 2.5 2.5 0 0 0 2.5-2.5 2.5 2.5 0 0 0-2.5-2.5z"/></svg>
      </button><span class="blbl">AI講解</span>
    </div>
    <div class="btn-col">
      <button class="cbtn" id="bh">
        <svg viewBox="0 0 24 24"><path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3zM5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82z"/></svg>
      </button><span class="blbl">全息</span>
    </div>
  </div>

  <script>
  // ═══ 狀態與 UI ═══════════════════════════════════════════
  const G = { isTracking: false, aiDone: false, isVideoPlaying: false, isMuted: true };
  let _st;
  function showSt(m,d=2800){const e=document.getElementById('status');e.textContent=m;e.classList.add('show');clearTimeout(_st);_st=setTimeout(()=>e.classList.remove('show'),d);}
  function flash(){const f=document.getElementById('flash');f.classList.add('active');setTimeout(()=>f.classList.remove('active'),900);}
  function slamBadge(s){
    const b=document.getElementById('slam-badge'),dot=document.getElementById('slam-dot'),t=document.getElementById('slam-txt');
    b.classList.add('show');
    if(s==='locked'){dot.style.background='#00ff88';b.style.borderColor='rgba(0,255,136,0.5)';t.textContent='影像已鎖定 · 錨定中';}
    else if(s==='tracking'){dot.style.background='#00ccff';b.style.borderColor='rgba(0,200,255,0.5)';t.textContent='空間延伸追蹤中';}
  }

  // ═══ HOLO PANEL ══════════════════════════════════════
  const HP = {
    _t: null,
    init() { setInterval(() => { document.getElementById('hclock').textContent = new Date().toLocaleTimeString('zh-TW',{hour12:false}); }, 1000); },
    show(){ document.getElementById('holo-panel').classList.add('show'); },
    setMode(m){ document.getElementById('hpill').textContent = m; },
    setText(txt) {
      clearTimeout(this._t);
      const c = document.getElementById('holo-content'), cur = document.getElementById('holo-cur');
      c.textContent = ''; cur.classList.remove('done');
      let i = 0;
      const go = () => {
        if (i >= txt.length) { cur.classList.add('done'); return; }
        c.textContent += txt[i++]; this._t = setTimeout(go, 30);
      }; go();
    }
  };

  // ═══ AI 模擬 ══════════════════════════════════════════════
  async function getAI() {
    return '此幅海賊船金屬海報採用昇華印刷工藝，色彩永久定著於鋁板，不褪色。精緻細節捕捉大海壯闊與船帆張力，為您的空間增添冒險氛圍。';
  }

  // ═══ AR MODULE (重構版) ══════════════════════════════════
  function mkARModule(){
    let vEl, vTex, vMesh, hGrp, ring1, ring2, pts;
    let mainScene, mainCamera;
    const scanEl = document.getElementById('scan-ov');
    const raycaster = new THREE.Raycaster();
    const touchPos = new THREE.Vector2();

    function mkVid(){
      const v=document.createElement('video'); v.src=AR_CONFIG.videoSrc; v.loop=true; v.muted=true; v.playsInline=true; v.crossOrigin='anonymous';
      return v;
    }
    
    function togglePlay() {
      G.isVideoPlaying = !G.isVideoPlaying;
      if (G.isVideoPlaying) { vEl.play(); showSt('▶ 播放中'); } 
      else { vEl.pause(); showSt('⏸ 已暫停'); }
      document.getElementById('ipp').style.display = G.isVideoPlaying ? 'none' : 'block';
      document.getElementById('ipa').style.display = G.isVideoPlaying ? 'block' : 'none';
      document.getElementById('bp').classList.toggle('active', G.isVideoPlaying);
    }

    // ⭐ 進階應用：加入觸控 Raycaster (8th Wall 常見開源技巧)
    function onTouch(event) {
      if (!G.isTracking || !vMesh.visible) return;
      touchPos.x = (event.touches[0].clientX / window.innerWidth) * 2 - 1;
      touchPos.y = -(event.touches[0].clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(touchPos, mainCamera);
      
      const intersects = raycaster.intersectObject(vMesh);
      if (intersects.length > 0) {
        // 使用者點擊了 AR 影片，觸發播放/暫停
        togglePlay();
        // 觸控反饋動畫
        vMesh.scale.setScalar(vMesh.scale.x * 0.95);
        setTimeout(() => vMesh.scale.setScalar(vMesh.scale.x / 0.95), 150);
      }
    }

    // 核心位移邏輯
    function applyPose(detail){
      const { position, rotation, scale } = detail;
      vMesh.position.copy(position);
      vMesh.quaternion.copy(rotation);
      vMesh.scale.setScalar(scale);
      hGrp.position.copy(position);
      hGrp.quaternion.copy(rotation);
      hGrp.scale.setScalar(scale);
    }

    return {
      name:'ar-advanced-holo',
      onStart:()=>{
        const {scene, camera, renderer} = XR8.Threejs.xrScene();
        mainScene = scene; mainCamera = camera;
        renderer.setPixelRatio(window.devicePixelRatio);
        
        // 影片材質
        vEl = mkVid();
        vTex = new THREE.VideoTexture(vEl);
        vTex.minFilter = THREE.LinearFilter;
        vMesh = new THREE.Mesh(
          new THREE.PlaneGeometry(1, 1/AR_CONFIG.videoAspectRatio),
          new THREE.MeshBasicMaterial({map: vTex, side: THREE.DoubleSide})
        );
        vMesh.visible = false;
        scene.add(vMesh);

        // 全息裝飾群組
        hGrp = new THREE.Group();
        hGrp.visible = false;
        scene.add(hGrp);

        HP.init();
        
        // 綁定按鈕
        document.getElementById('bp').addEventListener('click', togglePlay);
        
        // 綁定觸控
        window.addEventListener('touchstart', onTouch);
      },
      onUpdate:()=>{
        // 可以在這裡加入裝飾物的旋轉動畫
      },
      listeners:[
        {
          event: 'reality.imagefound', 
          process: async ({detail}) => {
            applyPose(detail);
            vMesh.visible = true; hGrp.visible = true;
            G.isTracking = true;
            scanEl.classList.add('hidden');
            flash(); slamBadge('locked'); showSt('✅ 目標鎖定，可點擊畫面互動');
            
            if (!G.isVideoPlaying) togglePlay();
            
            if(!G.aiDone){
              G.aiDone = true; HP.show(); HP.setText('⬛ 啟動 AI 解說...');
              const t = await getAI(); HP.setText(t); HP.setMode('IMG LOCK');
            }
          }
        },
        {
          event: 'reality.imageupdated', 
          process: ({detail}) => {
            // 當看到圖片時，持續更新位置
            applyPose(detail);
            slamBadge('locked');
          }
        },
        {
          event: 'reality.imagelost', 
          process: () => {
            // ⭐ 關鍵修正：遺失圖片時，我們「不」隱藏物件，也「不」更新座標。
            // 由於 8th Wall 已開啟 disableWorldTracking: false，
            // 系統會自動轉用空間追蹤(SLAM)維持物件在世界中的相對位置！
            slamBadge('tracking');
            showSt('📍 進入空間延伸追蹤');
          }
        }
      ]
    };
  }

  // ═══ 初始化 ═════════════════════════════════════════════
  window.addEventListener('xrloaded', async () => {
    HP.init();
    
    // 載入 JSON Target
    const r = await fetch(AR_CONFIG.targetJsonPath);
    const targetData = await r.json();

    // ⭐ disableWorldTracking 必須為 false 才能啟用 Extended Tracking (SLAM)
    XR8.XrController.configure({ 
      disableWorldTracking: false, 
      imageTargetData: [targetData] 
    });

    XR8.addCameraPipelineModules([
      XR8.GlTextureRenderer.pipelineModule(),
      XR8.Threejs.pipelineModule(),
      XR8.XrController.pipelineModule(),
      mkARModule(),
    ]);
    
    XR8.run({ canvas: document.getElementById('renderCanvas') });
  });
  </script>
</body>
</html>
