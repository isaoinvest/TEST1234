  <script>
  // ─────────────────────────────────────────────────
  //  Canvas roundRect polyfill（iOS 15.3 以下相容）
  // ─────────────────────────────────────────────────
  if (!CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
      r = Math.min(r, w/2, h/2);
      this.beginPath();
      this.moveTo(x+r,y); this.lineTo(x+w-r,y); this.arcTo(x+w,y,x+w,y+r,r);
      this.lineTo(x+w,y+h-r); this.arcTo(x+w,y+h,x+w-r,y+h,r);
      this.lineTo(x+r,y+h); this.arcTo(x,y+h,x,y+h-r,r);
      this.lineTo(x,y+r); this.arcTo(x,y,x+r,y,r);
      this.closePath();
    };
  }

  // ─────────────────────────────────────────────────
  //  DEBUG
  // ─────────────────────────────────────────────────
  const Debug = {
    panel: null,
    init() {
      this.panel = document.getElementById('debug-panel');
      const btn = document.getElementById('btn-debug');
      let t;
      btn.addEventListener('touchstart', () => { t = setTimeout(() => this.panel.classList.toggle('show'), 1500); });
      btn.addEventListener('touchend',   () => clearTimeout(t));
      btn.addEventListener('click',      () => this.panel.classList.toggle('show'));
      const oe = console.error.bind(console);
      console.error = (...a) => { this.log(a.join(' '), 'err'); oe(...a); };
      window.addEventListener('error', e => this.log(`${e.message} L${e.lineno}`, 'err'));
    },
    log(msg, type='inf') {
      if (!this.panel) return;
      const d = document.createElement('div');
      d.className = type;
      d.textContent = `${new Date().toLocaleTimeString()} ${msg}`;
      this.panel.appendChild(d);
      this.panel.scrollTop = this.panel.scrollHeight;
    }
  };
  Debug.init();

  // ─────────────────────────────────────────────────
  //  PREFLIGHT
  // ─────────────────────────────────────────────────
  async function preflightCheck() {
    const list = [
      { url: './external/xr/xr.js',     label: 'xr.js'    },
      { url: './external/xr/xr-slam.js', label: 'xr-slam'  },
      { url: AR_CONFIG.targetJsonPath,   label: 'target JSON'},
    ];
    for (const c of list) {
      try {
        const r = await fetch(c.url, { method:'HEAD' });
        r.ok ? Debug.log(`✅ ${c.label}`, 'ok') : Debug.log(`❌ ${c.label} HTTP${r.status}`, 'err');
      } catch { Debug.log(`❌ ${c.label}`, 'err'); }
    }
  }

  // ─────────────────────────────────────────────────
  //  AI — Claude API（或示範文字）
  // ─────────────────────────────────────────────────
  const DEMO = [
    '此幅海賊船金屬海報採用昇華印刷工藝，色彩永久定著於鋁板，不褪色、不龜裂。細膩的筆觸捕捉了大海的壯闊與船帆的張力，適合典藏於書房或展示牆面。',
    '以一畫千言的獨特工藝打造，每塊金屬海報承載創作者對細節的極致追求。高溫昇華讓色彩融入金屬纖維，展現超越紙張的層次感與質感。',
  ];

  async function fetchAIExplanation() {
    if (!AR_CONFIG.claudeApiKey) {
      Debug.log('AI: 無 API Key，使用示範文字', 'inf');
      return DEMO[Math.floor(Math.random() * DEMO.length)];
    }
    try {
      Debug.log('AI: 呼叫 Claude...', 'inf');
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type':  'application/json',
          'x-api-key':     AR_CONFIG.claudeApiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 150,
          messages: [{ role:'user', content:
            `你是AR博物館語音導覽AI。用繁體中文、60字以內介紹「${AR_CONFIG.productName}」。` +
            `資訊：${AR_CONFIG.productInfo}。語氣簡潔有力，如博物館解說員。` }]
        })
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      const text = data.content?.[0]?.text || DEMO[0];
      Debug.log(`AI: 成功（${text.length}字）`, 'ok');
      return text;
    } catch (err) {
      Debug.log(`AI 錯誤: ${err.message}，改用示範文字`, 'inf');
      return DEMO[0];
    }
  }

  // ─────────────────────────────────────────────────
  //  HOLO PANEL — Three.js CanvasTexture 全息面板
  // ─────────────────────────────────────────────────
  class HoloPanel {
    constructor(w = 0.88, h = 0.58) {
      this.cv  = document.createElement('canvas');
      this.cv.width  = 512;
      this.cv.height = 320;
      this.ctx = this.cv.getContext('2d');
      this.tex = new THREE.CanvasTexture(this.cv);

      const geo = new THREE.PlaneGeometry(w, h);
      const mat = new THREE.MeshBasicMaterial({
        map: this.tex, transparent: true,
        side: THREE.DoubleSide, depthWrite: false, opacity: 0.96,
      });
      this.mesh = new THREE.Mesh(geo, mat);
      this.mesh.visible = false;

      this.title       = AR_CONFIG.productName;
      this.fullText    = '';
      this.displayText = '';
      this.typing      = false;
      this._ti         = 0;
      this._scanY      = 0;
      this._frame      = 0;
      this._glitch     = 0;
      this._raf();
    }

    setText(t) {
      this.fullText    = t;
      this.displayText = '';
      this.typing      = true;
      this._ti         = 0;
      this._typeNext();
    }
    _typeNext() {
      if (this._ti >= this.fullText.length) { this.typing = false; return; }
      this.displayText += this.fullText[this._ti++];
      setTimeout(() => this._typeNext(), 36);
    }

    _raf() {
      this._frame++;
      this._scanY = (this._scanY + 1.8) % this.cv.height;
      if (Math.random() < 0.025) this._glitch = 5;
      if (this._glitch > 0) this._glitch--;
      this._draw();
      requestAnimationFrame(() => this._raf());
    }

    _draw() {
      const ctx = this.ctx, W = this.cv.width, H = this.cv.height;
      ctx.clearRect(0, 0, W, H);

      // ── 背景 ──
      const bg = ctx.createLinearGradient(0,0,0,H);
      bg.addColorStop(0, 'rgba(0,18,48,.95)');
      bg.addColorStop(1, 'rgba(0,5,18,.95)');
      ctx.fillStyle = bg;
      ctx.roundRect(4,4,W-8,H-8,14);
      ctx.fill();

      // ── 外框光暈 ──
      ctx.shadowColor = 'rgba(0,170,255,.55)';
      ctx.shadowBlur  = 14;
      ctx.strokeStyle = `rgba(0,${165+Math.sin(this._frame*.05)*30},255,.85)`;
      ctx.lineWidth   = 1.5;
      ctx.roundRect(4,4,W-8,H-8,14);
      ctx.stroke();
      ctx.shadowBlur  = 0;

      // ── 角落標記 ──
      const cs = [[8,8,1,1],[W-8,8,-1,1],[8,H-8,1,-1],[W-8,H-8,-1,-1]];
      ctx.strokeStyle='rgba(0,220,255,.9)'; ctx.lineWidth=2;
      cs.forEach(([cx,cy,sx,sy]) => {
        ctx.beginPath(); ctx.moveTo(cx,cy+sy*18); ctx.lineTo(cx,cy); ctx.lineTo(cx+sx*18,cy); ctx.stroke();
      });

      // ── 掃描光帶 ──
      const sg = ctx.createLinearGradient(0,this._scanY-28,0,this._scanY+28);
      sg.addColorStop(0,'rgba(0,200,255,0)');
      sg.addColorStop(.5,'rgba(0,200,255,.07)');
      sg.addColorStop(1,'rgba(0,200,255,0)');
      ctx.fillStyle=sg; ctx.fillRect(8,this._scanY-28,W-16,56);
      for(let y=8;y<H-8;y+=4){ctx.fillStyle='rgba(0,100,200,.022)';ctx.fillRect(8,y,W-16,1);}

      // ── Glitch ──
      if (this._glitch > 0) {
        ctx.fillStyle=`rgba(0,200,255,${this._glitch*.018})`;
        ctx.fillRect(8, Math.random()*H, W-16, 2+Math.random()*7);
      }

      // ── 頂部系統欄 ──
      ctx.font='bold 10px monospace'; ctx.textAlign='left';
      ctx.fillStyle='rgba(0,190,255,.48)';
      ctx.fillText('◉ AR·AI  SLAM:LOCK  IMG:TRACK', 16, 22);
      ctx.textAlign='right';
      ctx.fillText(`SYS:ONLINE`, W-16, 22);

      // ── 分隔 ──
      const dl = ctx.createLinearGradient(16,0,W-16,0);
      dl.addColorStop(0,'transparent'); dl.addColorStop(.5,'rgba(0,190,255,.5)'); dl.addColorStop(1,'transparent');
      ctx.strokeStyle=dl; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(16,30); ctx.lineTo(W-16,30); ctx.stroke();

      // ── 標題 ──
      ctx.font='bold 23px sans-serif'; ctx.textAlign='center';
      ctx.shadowColor='rgba(0,200,255,.9)'; ctx.shadowBlur=18;
      ctx.fillStyle='rgba(210,245,255,1)';
      ctx.fillText(this.title, W/2, 60);
      ctx.shadowBlur=0;

      // ── 品牌 ──
      ctx.font='10px monospace'; ctx.fillStyle='rgba(0,170,255,.5)';
      ctx.fillText('一畫千言  ×  AI NARRATOR', W/2, 76);

      // ── 分隔2 ──
      ctx.strokeStyle=dl;
      ctx.beginPath(); ctx.moveTo(16,86); ctx.lineTo(W-16,86); ctx.stroke();

      // ── AI 文字 ──
      ctx.font='15px sans-serif'; ctx.textAlign='left';
      ctx.fillStyle='rgba(210,242,255,.93)';
      ctx.shadowColor='rgba(100,200,255,.18)'; ctx.shadowBlur=3;
      const txt = this.displayText || '⬛ 正在初始化 AI 導覽系統…';
      const lines = this._wrap(ctx, txt, W-38);
      lines.forEach((ln,i) => ctx.fillText(ln, 18, 110+i*25));
      ctx.shadowBlur=0;

      // ── 游標 ──
      if (this.typing && this._frame%18 < 10) {
        const ll = lines[lines.length-1]||'';
        ctx.fillStyle='rgba(0,220,255,.9)';
        ctx.fillRect(18+ctx.measureText(ll).width+2, 96+(lines.length-1)*25, 2, 16);
      }

      // ── 底部狀態 ──
      ctx.strokeStyle=dl;
      ctx.beginPath(); ctx.moveTo(16,H-28); ctx.lineTo(W-16,H-28); ctx.stroke();
      ctx.font='10px monospace'; ctx.textAlign='center';
      ctx.fillStyle='rgba(0,155,255,.48)';
      ctx.fillText(this.typing ? '▌ AI GENERATING…' : '◉ READY  ◉ SLAM ANCHORED  ◉ IMG LOCK', W/2, H-10);

      this.tex.needsUpdate = true;
    }

    _wrap(ctx, text, maxW) {
      const lines=[]; let line='';
      for (const ch of text) {
        const test = line+ch;
        if (ctx.measureText(test).width > maxW && line) {
          lines.push(line); line=ch;
          if (lines.length>=6) { lines[5]+='…'; break; }
        } else line=test;
      }
      if (line && lines.length<6) lines.push(line);
      return lines;
    }
  }

  // ─────────────────────────────────────────────────
  //  THREE.JS 全息裝飾
  // ─────────────────────────────────────────────────
  function makeRing(r, tube, color, opacity) {
    const m = new THREE.Mesh(
      new THREE.TorusGeometry(r, tube, 6, 64),
      new THREE.MeshBasicMaterial({ color, transparent:true, opacity })
    );
    m.rotation.x = Math.PI/2;
    return m;
  }

  function makeParticles(count, radius) {
    const pos = new Float32Array(count*3);
    const vels = [];
    for (let i=0; i<count; i++) {
      const a = Math.random()*Math.PI*2, r = radius*(.7+Math.random()*.6), h = (Math.random()-.5)*.6;
      pos[i*3]=Math.cos(a)*r; pos[i*3+1]=h; pos[i*3+2]=Math.sin(a)*r;
      vels.push({ a, r, h, dA:(Math.random()-.5)*.018, dH:(Math.random()-.5)*.005 });
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    const pts = new THREE.Points(geo,
      new THREE.PointsMaterial({ color:0x00bbff, size:.008, transparent:true, opacity:.85 }));
    pts.userData = { vels, count };
    return pts;
  }

  function tickParticles(pts) {
    const pos = pts.geometry.attributes.position.array;
    const { vels, count } = pts.userData;
    for (let i=0; i<count; i++) {
      vels[i].a += vels[i].dA;
      vels[i].h += vels[i].dH;
      if (Math.abs(vels[i].h)>.42) vels[i].dH*=-1;
      pos[i*3]=Math.cos(vels[i].a)*vels[i].r;
      pos[i*3+1]=vels[i].h;
      pos[i*3+2]=Math.sin(vels[i].a)*vels[i].r;
    }
    pts.geometry.attributes.position.needsUpdate=true;
  }

  // ─────────────────────────────────────────────────
  //  P5.JS 流水系統
  // ─────────────────────────────────────────────────
  let waterSketch, currentGesture='none', gestureTimeout;

  const p5WaterSketch = (p) => {
    let particles=[], noiseOff=0, touchActive=false, ctX=0, ctY=0, wInt=1;
    class WP {
      constructor(x,y,i=1,g='default'){
        this.pos=p.createVector(x,y); this.vel=p.createVector(p.random(-1,1),p.random(-2,0));
        this.acc=p.createVector(0,0); this.life=this.maxLife=255;
        this.size=p.random(10,25)*i; this.i=i; this.g=g;
        this.gravity=p.createVector(0,.05*i); this.drag=.98; this.wh=false; this.wv=false;
        if(g==='circle'){this.vel.mult(.5);this.wh=true;}
        else if(g==='swipe')this.vel.mult(2);
        else if(g==='s-curve')this.wv=true;
        else if(g==='tap'){const a=p.random(p.TWO_PI);this.vel=p.createVector(p.cos(a),p.sin(a)).mult(p.random(1,4)*i);}
      }
      af(f){this.acc.add(f);}
      update(){
        this.af(this.gravity); this.vel.add(this.acc); this.vel.mult(this.drag);
        this.pos.add(this.vel); this.acc.mult(0);
        this.vel.x+=(p.noise(this.pos.x*.01,this.pos.y*.01,noiseOff)-.5)*.3;
        if(this.wh){
          const a=p.atan2(this.pos.y-ctY,this.pos.x-ctX);
          this.af(p.createVector(p.cos(a+p.PI/2),p.sin(a+p.PI/2)).mult(.2*this.i));
          this.af(p.createVector(ctX-this.pos.x,ctY-this.pos.y).normalize().mult(.05));
        }
        if(this.wv)this.vel.x+=p.sin(this.pos.y*.05+noiseOff)*.5;
        this.life-=p.random(1.5,4); this.size*=.99;
      }
      display(){
        const a=p.map(this.life,0,this.maxLife,0,255),pr=1-this.life/this.maxLife;
        let r,g,b;
        if(pr<.3){r=200+pr*55;g=220+pr*35;b=255;}
        else if(pr<.7){r=100-(pr-.3)*100;g=180-(pr-.3)*80;b=255;}
        else{r=0;g=100-(pr-.7)*100;b=200-(pr-.7)*50;}
        p.push(); p.translate(this.pos.x,this.pos.y); p.noStroke();
        p.fill(r,g,b,a*.2); p.ellipse(0,0,this.size*1.5);
        p.fill(r,g,b,a*.7); p.ellipse(0,0,this.size);
        if(this.life>this.maxLife*.5){p.fill(220,240,255,a);p.ellipse(0,0,this.size*.3);}
        p.pop();
      }
      dead(){return this.life<=0||this.size<1;}
    }
    p.setup=()=>{const c=p.createCanvas(p.windowWidth,p.windowHeight);c.parent('p5-container');p.colorMode(p.RGB,255);p.blendMode(p.ADD);};
    p.draw=()=>{
      p.clear(); noiseOff+=.01;
      if(touchActive&&particles.length<350)
        for(let i=0;i<Math.floor(wInt*8);i++)
          particles.push(new WP(ctX+p.random(-15,15),ctY+p.random(-15,15),wInt,currentGesture));
      for(let i=particles.length-1;i>=0;i--){particles[i].update();particles[i].display();if(particles[i].dead())particles.splice(i,1);}
    };
    p.windowResized=()=>p.resizeCanvas(p.windowWidth,p.windowHeight);
    p.setTouchActive=(a,x,y)=>{touchActive=a;if(a){ctX=x;ctY=y;}};
    p.updateTouchPosition=(x,y)=>{ctX=x;ctY=y;};
    p.setWaterIntensity=v=>{wInt=p.constrain(v,.1,3);};
    p.setGestureType=g=>{currentGesture=g;};
  };

  // ─────────────────────────────────────────────────
  //  手勢識別
  // ─────────────────────────────────────────────────
  class GR {
    constructor(){this.pts=[];}
    start(x,y){this.pts=[{x,y}];}
    add(x,y){if(!this.pts.length)return;this.pts.push({x,y});if(this.pts.length>50)this.pts.shift();}
    end(){return this.pts.length<5?'tap':this._a();}
    _a(){if(this._c())return'circle';if(this._s())return'swipe';if(this._sc())return's-curve';return'default';}
    _c(){
      if(this.pts.length<10)return false;
      let cx=0,cy=0;this.pts.forEach(p=>{cx+=p.x;cy+=p.y;});cx/=this.pts.length;cy/=this.pts.length;
      let r=0;this.pts.forEach(p=>{r+=Math.hypot(p.x-cx,p.y-cy);});r/=this.pts.length;
      return r>20&&this.pts.filter(p=>Math.abs(Math.hypot(p.x-cx,p.y-cy)-r)<r*.4).length/this.pts.length>.8;
    }
    _s(){const s=this.pts[0],e=this.pts[this.pts.length-1];return Math.hypot(e.x-s.x,e.y-s.y)>100;}
    _sc(){
      if(this.pts.length<8)return false;
      let ch=0,ld=null;
      for(let i=1;i<this.pts.length-1;i++){
        let d=Math.atan2(this.pts[i+1].y-this.pts[i].y,this.pts[i+1].x-this.pts[i].x)
             -Math.atan2(this.pts[i].y-this.pts[i-1].y,this.pts[i].x-this.pts[i-1].x);
        while(d>Math.PI)d-=2*Math.PI;while(d<-Math.PI)d+=2*Math.PI;
        const dir=d>0?'L':'R';if(ld&&ld!==dir)ch++;ld=dir;
      }
      return ch>=2;
    }
  }

  // ─────────────────────────────────────────────────
  //  UI helpers
  // ─────────────────────────────────────────────────
  function showStatus(t,d=2500){const e=document.getElementById('status');e.textContent=t;e.classList.add('show');clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove('show'),d);}
  function showGesture(t,d=1800){const e=document.getElementById('gesture');e.textContent=t;e.classList.add('show');clearTimeout(gestureTimeout);gestureTimeout=setTimeout(()=>e.classList.remove('show'),d);}
  function triggerFlash(){const f=document.getElementById('found-flash');f.classList.add('flash');setTimeout(()=>f.classList.remove('flash'),800);}
  function waterBurst(){const cx=window.innerWidth/2,cy=window.innerHeight/2;waterSketch.setTouchActive(true,cx,cy);waterSketch.setGestureType('tap');waterSketch.setWaterIntensity(3);setTimeout(()=>{waterSketch.setTouchActive(false,0,0);waterSketch.setWaterIntensity(appState.wi);},1200);}

  // ─────────────────────────────────────────────────
  //  APP STATE
  // ─────────────────────────────────────────────────
  const appState={tf:false,ae:false,cp:false,fs:false,hp:false,wi:1,holoOn:true,aiDone:false};

  // ─────────────────────────────────────────────────
  //  AR PIPELINE MODULE
  // ─────────────────────────────────────────────────
  function createARPipelineModule() {
    let vEl, vTex, vMesh;
    let holoGroup, ring1, ring2, particles, holoPanel;
    let fc = 0;

    const sO  = document.getElementById('scanning-overlay');
    const fsC = document.getElementById('fs-container');
    const fsV = document.getElementById('fs-video');
    const aiL = document.getElementById('ai-loading');

    // ── Video helpers ──
    function mkV(){
      const v=document.createElement('video');
      v.src=AR_CONFIG.videoSrc; v.loop=true; v.muted=true; v.playsInline=true;
      v.crossOrigin='anonymous'; v.setAttribute('webkit-playsinline','true');
      v.addEventListener('canplay',()=>Debug.log('影片 canplay','ok'));
      v.addEventListener('error',  ()=>Debug.log('影片錯誤','err'));
      return v;
    }
    async function pV(v){if(!v)return;try{await v.play();}catch(e){v.muted=true;appState.ae=false;uI();await v.play().catch(()=>{});}}
    function paV(v){if(v)v.pause();}
    function eFS(){if(!vEl)return;fsV.src=vEl.src;fsV.currentTime=vEl.currentTime;fsV.muted=!appState.ae;fsC.classList.add('visible');appState.fs=true;pV(fsV);}
    function xFS(){if(!appState.fs)return;if(vEl)vEl.currentTime=fsV.currentTime;fsC.classList.remove('visible');appState.fs=false;paV(fsV);fsV.src='';}
    function uI(){
      document.getElementById('ico-play').style.display=appState.cp?'none':'block';
      document.getElementById('ico-pause').style.display=appState.cp?'block':'none';
      document.getElementById('btn-play').classList.toggle('active',appState.cp);
      document.getElementById('ico-mute').style.display=appState.ae?'none':'block';
      document.getElementById('ico-sound').style.display=appState.ae?'block':'none';
      document.getElementById('btn-sound').classList.toggle('active',appState.ae);
    }
    function tA(){appState.ae=!appState.ae;if(vEl)vEl.muted=!appState.ae;fsV.muted=!appState.ae;uI();showStatus(appState.ae?'🔊 聲音 ON':'🔇 靜音');}

    function setupBtns(){
      document.getElementById('btn-play').addEventListener('click',()=>{
        if(!appState.hp){showStatus('請先掃描目標');return;}
        appState.cp=!appState.cp;uI();
        if(appState.cp){showStatus('▶ 持續播放');if(!appState.tf){eFS();sO.classList.add('hidden');}else if(vEl&&vEl.paused)pV(vEl);}
        else{showStatus('⏸ 暫停');xFS();if(!appState.tf&&vEl)paV(vEl);if(!appState.tf)sO.classList.remove('hidden');}
      });
      document.getElementById('btn-sound').addEventListener('click',tA);

      // 全息面板切換
      document.getElementById('btn-holo').addEventListener('click',()=>{
        if(!holoGroup)return;
        appState.holoOn=!appState.holoOn;
        holoGroup.visible=appState.holoOn&&appState.tf;
        document.getElementById('btn-holo').classList.toggle('active',appState.holoOn);
        showStatus(appState.holoOn?'🔷 全息面板 ON':'🔲 全息面板 OFF');
      });

      // AI 重新呼叫
      document.getElementById('btn-ai').addEventListener('click',async()=>{
        if(!holoPanel){showStatus('請先掃描目標');return;}
        document.getElementById('btn-ai').classList.add('active');
        aiL.classList.add('show');
        holoPanel.setText('⬛ AI 重新分析中…');
        const text=await fetchAIExplanation();
        holoPanel.setText(text);
        aiL.classList.remove('show');
        document.getElementById('btn-ai').classList.remove('active');
        showStatus('🤖 AI 導覽已更新');
      });

      // 水流強度
      let lvl=1;
      document.getElementById('btn-water').addEventListener('click',()=>{
        lvl=(lvl%3)+1;appState.wi=lvl*.9;waterSketch?.setWaterIntensity(appState.wi);
        showStatus({1:'💧 弱',2:'💧💧 中',3:'💧💧💧 強'}[lvl]);
        document.getElementById('btn-water').classList.toggle('active',lvl===3);
      });

      fsC.addEventListener('click',()=>{xFS();appState.cp=false;uI();if(!appState.tf)sO.classList.remove('hidden');});
    }

    // ── 更新 mesh 位置 ──
    function applyPose(mesh, detail) {
      const {position:pos, rotation:rot, scale:sc} = detail;
      mesh.position.set(pos.x, pos.y, pos.z);
      mesh.quaternion.set(rot.x, rot.y, rot.z, rot.w);
      mesh.scale.set(sc, sc, sc);
    }

    async function onFound({detail}) {
      Debug.log(`✅ imagefound "${detail.name}" scale=${detail.scale?.toFixed(3)}`, 'ok');
      applyPose(vMesh, detail);
      applyPose(holoGroup, detail);
      vMesh.visible    = true;
      holoGroup.visible = appState.holoOn;
      appState.tf=true; appState.hp=true;
      sO.classList.add('hidden');
      triggerFlash();
      showStatus('✅ 目標鎖定 + SLAM 世界錨定');
      if(appState.fs)xFS();
      pV(vEl); waterBurst();

      // AI 導覽（只初始化一次；之後用按鈕手動觸發）
      if(!appState.aiDone){
        appState.aiDone=true;
        aiL.classList.add('show');
        const text=await fetchAIExplanation();
        if(holoPanel) holoPanel.setText(text);
        aiL.classList.remove('show');
        showStatus('🤖 AI 導覽已啟動',3000);
      }
    }

    function onUpdated({detail}) {
      applyPose(vMesh, detail);
      applyPose(holoGroup, detail);
    }

    function onLost() {
      Debug.log('⚠️ imagelost（SLAM 持續定位）','inf');
      // ✅ SLAM：不隱藏物件，繼續依世界座標顯示
      appState.tf=false;
      showStatus('⚠️ 目標離開視野（SLAM 持續定位）');
      if(appState.cp)eFS();
      else{paV(vEl);setTimeout(()=>{if(!appState.tf&&!appState.cp)sO.classList.remove('hidden');},800);}
    }

    return {
      name: 'ar-hologram-app',

      onStart: () => {
        const {scene, renderer} = XR8.Threejs.xrScene();

        // Renderer 全螢幕
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight, false);
        renderer.domElement.style.cssText='position:fixed!important;top:0!important;left:0!important;width:100vw!important;height:100vh!important;z-index:0!important;';
        Debug.log(`Renderer ${window.innerWidth}×${window.innerHeight}`,'ok');

        // ── 影片平面 ──
        vEl  = mkV();
        vTex = new THREE.VideoTexture(vEl);
        vTex.minFilter=vTex.magFilter=THREE.LinearFilter; vTex.format=THREE.RGBAFormat;
        vMesh = new THREE.Mesh(
          new THREE.PlaneGeometry(1, 1/AR_CONFIG.videoAspectRatio),
          new THREE.MeshBasicMaterial({map:vTex, side:THREE.DoubleSide, toneMapped:false})
        );
        vMesh.visible=false; scene.add(vMesh);

        // ── 全息裝飾群組 ──
        holoGroup = new THREE.Group();
        holoGroup.visible = false;
        scene.add(holoGroup);

        if (AR_CONFIG.enableHoloRings) {
          ring1 = makeRing(.68, .004, 0x00ccff, .72); holoGroup.add(ring1);
          ring2 = makeRing(.56, .003, 0x0055ff, .50); ring2.rotation.x=Math.PI/3; holoGroup.add(ring2);
        }
        if (AR_CONFIG.enableHoloParticles) {
          particles = makeParticles(90, .62); holoGroup.add(particles);
        }
        if (AR_CONFIG.enableHoloPanel) {
          holoPanel = new HoloPanel();
          // 放在目標正右側，稍微偏上
          holoPanel.mesh.position.set(1.1, 0.18, 0.04);
          holoGroup.add(holoPanel.mesh);
        }

        scene.add(new THREE.AmbientLight(0xffffff, 1));
        setupBtns();
        Debug.log('✅ 全息 Scene 就緒（SLAM + Image Tracking + AI）','ok');
        setTimeout(()=>showStatus('請將鏡頭對準目標圖像',4000),800);
      },

      onUpdate: () => {
        fc++;
        // 光環旋轉
        if(ring1){ ring1.rotation.z+=.007; }
        if(ring2){ ring2.rotation.z-=.005; ring2.rotation.y+=.004; }
        // 粒子動畫
        if(particles) tickParticles(particles);
        // SLAM badge 在 2 秒後出現
        if(fc===120) document.getElementById('slam-badge').classList.add('show');
      },

      listeners: [
        {event:'reality.imagefound',   process: onFound   },
        {event:'reality.imageupdated', process: onUpdated },
        {event:'reality.imagelost',    process: onLost    },
      ],

      onAttach: () => {
        window.addEventListener('resize', ()=>{
          const {renderer}=XR8.Threejs.xrScene();
          renderer.setSize(window.innerWidth,window.innerHeight,false);
        });
        document.addEventListener('visibilitychange',()=>{
          if(document.hidden){paV(vEl);waterSketch?.setTouchActive(false,0,0);}
          else if(appState.tf&&vEl)pV(vEl);
        });
      },
    };
  }

  // ─────────────────────────────────────────────────
  //  觸控手勢系統
  // ─────────────────────────────────────────────────
  function setupGestureSystem() {
    const rec=new GR(); let drawing=false;
    const msgs={tap:'💧 水滴',circle:'🌀 漩渦',swipe:'🌊 水流','s-curve':'🐍 蛇行',default:'💧 流水'};
    function oS(e){if(e.target.closest('.controls-container,#fs-container'))return;const t=e.touches?e.touches[0]:e;drawing=true;rec.start(t.clientX,t.clientY);waterSketch.setTouchActive(true,t.clientX,t.clientY);waterSketch.setWaterIntensity(appState.wi);}
    function oM(e){if(!drawing)return;const t=e.touches?e.touches[0]:e;rec.add(t.clientX,t.clientY);waterSketch.updateTouchPosition(t.clientX,t.clientY);}
    function oE(){if(!drawing)return;drawing=false;const g=rec.end();currentGesture=g;waterSketch.setGestureType(g);waterSketch.setTouchActive(false,0,0);showGesture(msgs[g]||msgs.default,1800);}
    document.body.addEventListener('touchstart',oS,{passive:false});
    document.body.addEventListener('touchmove', oM,{passive:false});
    document.body.addEventListener('touchend',  oE);
    document.body.addEventListener('mousedown', oS);
    document.body.addEventListener('mousemove', oM);
    document.body.addEventListener('mouseup',   oE);
  }

  // ─────────────────────────────────────────────────
  //  主入口
  // ─────────────────────────────────────────────────
  window.addEventListener('xrloaded', async () => {
    Debug.log('✅ xrloaded — SLAM + Image Tracking + AI Holo','ok');
    showStatus('載入目標資料...',3000);

    let targetData;
    try {
      const r = await fetch(AR_CONFIG.targetJsonPath);
      if(!r.ok) throw new Error(`HTTP ${r.status}`);
      targetData = await r.json();
      Debug.log(`✅ target JSON name="${targetData.name}"`, 'ok');
    } catch(err) {
      Debug.log('❌ JSON 失敗: '+err.message,'err');
      document.getElementById('debug-panel').classList.add('show');
      showStatus('❌ 目標資料載入失敗',8000);
      return;
    }

    XR8.XrController.configure({
      disableWorldTracking: !AR_CONFIG.enableSLAM,   // ✅ SLAM ON
      imageTargetData: [targetData],
    });

    XR8.addCameraPipelineModules([
      XR8.GlTextureRenderer.pipelineModule(),
      XR8.Threejs.pipelineModule(),
      XR8.XrController.pipelineModule(),
      createARPipelineModule(),
    ]);

    XR8.run({ canvas: document.getElementById('renderCanvas') });
    Debug.log('✅ XR8.run() — 全系統啟動','ok');

    waterSketch = new p5(p5WaterSketch);
    setupGestureSystem();
  });

  window.addEventListener('xrerror', e => {
    Debug.log('❌ xrerror: '+JSON.stringify(e.detail),'err');
    document.getElementById('debug-panel').classList.add('show');
    showStatus('❌ AR 引擎錯誤',10000);
  });

  window.addEventListener('load', async () => { await preflightCheck(); });
  </script>
</body>
</html>
